[workspace]
# TEMP: it currently complains for some unclear reason.
allow_dirty = true

# Changelogs do not offer much value, not worth the effort.
changelog_update = false

# Git releases are off by default because most crates are libraries that only publish to
# crates.io. The binary crates are the exception: release.yml injects git_release_enable = true
# for them at CI time so their prebuilt-binary uploads have a GitHub release to attach to. The
# committed config stays free of per-binary release flags.
git_release_enable = false

# Pin the tag format explicitly (this is already the multi-package-workspace default).
# The prebuilt-binary asset URLs in each binary crate's `[package.metadata.binstall]`
# block are derived from this exact pattern, so freezing it here stops a future
# release-plz default change from silently breaking `cargo binstall`.
git_tag_name = "{{ package }}-v{{ version }}"

# It complains about timeouts now and then. Not convinced it is really timing out but.
publish_timeout = "45m"

[[package]]
name = "cargo-bench-history"

# cargo-bench-history and cargo-bench-history-core are logically the same package
# split into two crates for cargotechnical reasons (see docs/impl-crate-split.md).
# They must always be released at the same version; the workspace Cargo.toml
# additionally pins cargo-bench-history-core with `=` so the CLI and its core can
# never end up at mismatched versions.
version_group = "cargo-bench-history"

[[package]]
name = "cargo-bench-history-core"

# See the `cargo-bench-history` entry above. `cargo-bench-history-core` carries the
# pure, I/O-free logic the CLI depends on; its version number keeps the pair in
# lockstep and the workspace Cargo.toml pins it with `=`.
version_group = "cargo-bench-history"

[[package]]
name = "cbh_codec"

# One of the `cargo-bench-history` implementation crates (see docs/impl-crate-split.md):
# doc-hidden, "do not depend on directly", released in lockstep with the CLI so the
# published set can never drift. The workspace Cargo.toml pins it with `=`.
version_group = "cargo-bench-history"

[[package]]
name = "cbh_model"

# One of the `cargo-bench-history` implementation crates (see docs/impl-crate-split.md):
# doc-hidden, "do not depend on directly", released in lockstep with the CLI so the
# published set can never drift. The workspace Cargo.toml pins it with `=`.
version_group = "cargo-bench-history"

[[package]]
name = "cbh_stats"

# One of the `cargo-bench-history` implementation crates (see docs/impl-crate-split.md):
# doc-hidden, "do not depend on directly", released in lockstep with the CLI so the
# published set can never drift. The workspace Cargo.toml pins it with `=`.
version_group = "cargo-bench-history"

[[package]]
name = "linked"

# Changelogs of these two are merged into the `linked` package as the others are "invisible" packages.
changelog_include = ["linked_macros", "linked_macros_impl"]

# All the `linked*` packages are published under the same version, as they are
# all the "logically same" package, just separated for cargotechnical reasons.
# The workspace Cargo.toml additionally pins linked_macros and linked_macros_impl
# with `=` so downstream consumers cannot end up with a mismatched set.
version_group = "linked"

[[package]]
name = "linked_macros"

# This package is invisible, changes are recorded in `linked` changelog instead.
changelog_update = false

# All the `linked*` packages are published under the same version, as they are
# all the "logically same" package, just separated for cargotechnical reasons.
version_group = "linked"

[[package]]
name = "linked_macros_impl"

# This package is invisible, changes are recorded in `linked` changelog instead.
changelog_update = false

# All the `linked*` packages are published under the same version, as they are
# all the "logically same" package, just separated for cargotechnical reasons.
version_group = "linked"

[[package]]
name = "many_cpus"

# many_cpus and many_cpus_impl are logically the same package split into two
# crates for cargotechnical reasons (see docs/impl-crate-split.md). They must
# always be released at the same version; the workspace Cargo.toml additionally
# pins many_cpus_impl with `=` so downstream consumers cannot end up with a
# mismatched pair.
version_group = "many_cpus"

[[package]]
name = "many_cpus_impl"

# See the `many_cpus` entry above. `many_cpus_impl` is doc-hidden and "do not
# depend on directly", so its version number is mainly a vehicle for keeping
# the pair in lockstep — its release notes are not consumed by end users.
version_group = "many_cpus"

[[package]]
name = "nm"

# nm and nm_impl are logically the same package split into two crates for
# cargotechnical reasons (see docs/impl-crate-split.md). They must always be
# released at the same version; the workspace Cargo.toml additionally pins
# nm_impl with `=` so downstream consumers cannot end up with a mismatched
# pair.
version_group = "nm"

[[package]]
name = "nm_impl"

# See the `nm` entry above. `nm_impl` is doc-hidden and "do not depend on
# directly", so its version number is mainly a vehicle for keeping the pair
# in lockstep — its release notes are not consumed by end users.
version_group = "nm"

[[package]]
name = "nm_otel"

# nm_otel and nm_otel_impl are logically the same package split into two
# crates for cargotechnical reasons (see docs/impl-crate-split.md). They must
# always be released at the same version; the workspace Cargo.toml additionally
# pins nm_otel_impl with `=` so downstream consumers cannot end up with a
# mismatched pair.
version_group = "nm_otel"

[[package]]
name = "nm_otel_impl"

# See the `nm_otel` entry above. `nm_otel_impl` is doc-hidden and "do not
# depend on directly", so its version number is mainly a vehicle for keeping
# the pair in lockstep — its release notes are not consumed by end users.
version_group = "nm_otel"
