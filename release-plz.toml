[workspace]
# TEMP: it currently complains for some unclear reason.
allow_dirty = true

# Changelogs do not offer much value, not worth the effort.
changelog_update = false

# All we care about is crates.io, Git releases are not used.
git_release_enable = false

# It complains about timeouts now and then. Not convinced it is really timing out but.
publish_timeout = "45m"

[[package]]
name = "linked"

# Changelogs of these two are merged into the `linked` package as the others are "invisible" packages.
changelog_include = ["linked_macros", "linked_macros_impl"]

# All the `linked*` packages are published under the same version, as they are
# all the "logically same" package, just separated for cargotechnical reasons.
version_group = "linked"

[[package]]
name = "linked_macros"

# This package is invisible, changes are recorded in `linked` changelog instead.
changelog_update = false

# All the `linked*` packages are published under the same version, as they are
# all the "logically same" package, just separated for cargotechnical reasons.
version_group = "linked"

[[package]]
name = "linked_macros_impl"

# This package is invisible, changes are recorded in `linked` changelog instead.
changelog_update = false

# All the `linked*` packages are published under the same version, as they are
# all the "logically same" package, just separated for cargotechnical reasons.
version_group = "linked"

[[package]]
name = "nm"

# nm and nm_impl are logically the same package split into two crates for
# cargotechnical reasons (see docs/impl-crate-split.md). They must always be
# released at the same version; the workspace Cargo.toml additionally pins
# nm_impl with `=` so downstream consumers cannot end up with a mismatched
# pair.
version_group = "nm"

[[package]]
name = "nm_impl"

# See the `nm` entry above. `nm_impl` is doc-hidden and "do not depend on
# directly", so its version number is mainly a vehicle for keeping the pair
# in lockstep — its release notes are not consumed by end users.
version_group = "nm"

[[package]]
name = "nm_otel"

# nm_otel and nm_otel_impl are logically the same package split into two
# crates for cargotechnical reasons (see docs/impl-crate-split.md). They must
# always be released at the same version; the workspace Cargo.toml additionally
# pins nm_otel_impl with `=` so downstream consumers cannot end up with a
# mismatched pair.
version_group = "nm_otel"

[[package]]
name = "nm_otel_impl"

# See the `nm_otel` entry above. `nm_otel_impl` is doc-hidden and "do not
# depend on directly", so its version number is mainly a vehicle for keeping
# the pair in lockstep — its release notes are not consumed by end users.
version_group = "nm_otel"
