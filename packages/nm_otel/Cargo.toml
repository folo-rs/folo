[package]
name = "nm_otel"
description = "OpenTelemetry bridge for nm metrics"
publish = true
version = "0.4.9"

authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

[package.metadata.docs.rs]
all-features = true

[dependencies]
nm_otel_impl = { workspace = true }

[dev-dependencies]
# Needed so the re-export smoke test can exercise the public API end-to-end with
# a real OpenTelemetry meter provider.
nm = { path = "../nm" }
# The user-facing console example depends on these. They are not required by the
# library itself.
opentelemetry = { workspace = true, features = ["metrics"] }
opentelemetry-stdout = { workspace = true, features = ["metrics"] }
opentelemetry_sdk = { workspace = true, features = ["metrics", "testing"] }
static_assertions = { workspace = true }
tick = { workspace = true, features = ["tokio", "test-util"] }
tokio = { workspace = true, features = ["rt", "rt-multi-thread", "macros", "time"] }

[lints]
workspace = true
