[package]
name = "nm_otel"
description = "OpenTelemetry bridge for nm metrics"
publish = true
version = "0.4.9"

authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

[package.metadata.docs.rs]
all-features = true

[dependencies]
# Exact-version pin on `nm_otel_impl`: `nm_otel` and `nm_otel_impl` are logically
# the same package split into two crates for cargotechnical reasons (see
# `docs/impl-crate-split.md`). We do not maintain a SemVer boundary between
# them. release-plz `version_group = "nm_otel"` keeps their versions in lockstep
# at release time; the `=` pin enforces at the Cargo manifest level that
# downstream consumers never end up with a mismatched pair, and tells
# `cargo update` that there is no acceptable alternate version.
nm_otel_impl = { version = "=0.1.0", path = "../nm_otel_impl", default-features = false }

[dev-dependencies]
# Needed so the re-export smoke test can exercise the public API end-to-end with
# a real OpenTelemetry meter provider.
nm = { path = "../nm" }
# The user-facing console example depends on these. They are not required by the
# library itself.
opentelemetry = { workspace = true, features = ["metrics"] }
opentelemetry-stdout = { workspace = true, features = ["metrics"] }
opentelemetry_sdk = { workspace = true, features = ["metrics", "testing"] }
static_assertions = { workspace = true }
tick = { workspace = true, features = ["tokio", "test-util"] }
tokio = { workspace = true, features = ["rt", "rt-multi-thread", "macros", "time"] }

[lints]
workspace = true
