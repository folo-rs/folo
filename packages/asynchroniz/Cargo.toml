[package]
name = "asynchroniz"
description = "Async mutex and semaphore primitives (experimental)"
publish = false
version = "0.1.0"

authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

[package.metadata.docs.rs]
all-features = true

[package.metadata.cargo-udeps.ignore]
development = [
    "alloc_tracker",
    "async-lock",
    "criterion",
    "futures",
    "tokio",
]

[dependencies]
awaiter_set = { workspace = true }

[dev-dependencies]
alloc_tracker = { path = "../alloc_tracker" }
async-lock = { workspace = true }
criterion = { workspace = true }
futures = { workspace = true }
mutants = { workspace = true }
static_assertions = { workspace = true }
testing = { path = "../testing" }
tokio = { workspace = true, features = ["macros", "rt", "rt-multi-thread", "sync"] }

[[bench]]
name = "asynchroniz_bench"
harness = false

[lints]
workspace = true
