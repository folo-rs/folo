[package]
# Cargo has its own logic for naming and expects dashes. Okay.
name = "cargo-detect-package"
description = "A Cargo tool to detect the package that a file belongs to, passing the package name to a subcommand"
publish = true
version = "1.0.25"

authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

[package.metadata.docs.rs]
all-features = true

[package.metadata.binstall]
# Prebuilt binaries are published by .github/workflows/release.yml (see
# docs/release-automation.md). release-plz tags releases as `<crate>-v<version>`,
# which cargo-binstall's auto-detection does not derive, so the URL is explicit.
# Archives are `.zip` on every platform and the binary sits at the archive root.
pkg-url = "{ repo }/releases/download/{ name }-v{ version }/{ name }-v{ version }-{ target }.zip"
bin-dir = "{ bin }{ binary-ext }"
pkg-fmt = "zip"

[dependencies]
clap = { workspace = true, features = ["derive"] }
mimalloc = { workspace = true }
toml = { workspace = true, features = ["parse", "serde"] }

[dev-dependencies]
mockall = { workspace = true }
mutants = { workspace = true }
serial_test = { workspace = true }
tempfile = { workspace = true }

[lints]
workspace = true
