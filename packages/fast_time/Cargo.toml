[package]
name = "fast_time"
description = "An efficient low-precision timestamp source suitable for high-frequency querying"
publish = true
version = "0.1.22"

authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

[package.metadata.docs.rs]
all-features = true

[features]
default = []
# Enables deterministic fake-clock constructors (Clock::fake_*) for benchmarks
# and tests. Only use this in dev-dependencies.
test-util = []

[dependencies]

[target.'cfg(target_os = "linux")'.dependencies]
libc = { workspace = true }

[target.'cfg(windows)'.dependencies]
windows = { workspace = true, features = ["Win32_System_SystemInformation"] }

[dev-dependencies]
criterion = { workspace = true }
# Self-dependency with `test-util` so benchmarks can use the deterministic
# Clock::fake_* constructors (feature unification enables it for dev targets).
fast_time = { path = ".", features = ["test-util"] }
mockall = { workspace = true }
mutants = { workspace = true }
static_assertions = { workspace = true }

[target.'cfg(target_os = "linux")'.dev-dependencies]
gungraun = { workspace = true, features = ["default"] }

[lints]
workspace = true

[[bench]]
name = "fast_time_timestamp_performance"
harness = false

[[bench]]
name = "fast_time_clock_cg"
harness = false


