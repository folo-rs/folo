[package]
# Cargo has its own logic for naming and expects dashes for the `cargo-bench-history`
# binary, but its internal implementation crates use the short `cbh_` underscore prefix.
name = "cbh_diag"
description = "Implementation crate for cargo-bench-history - do not reference directly"
publish = true
version = "0.0.3"

authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

[lib]
# This is an implementation crate whose surface is documented on `cargo-bench-history`.
doc = false

[features]
# Internal-only API surface for in-workspace tests: the `RecordingReporter` that other
# crates' tests (and this crate's own tests) use in place of the standard-error reporter
# to assert on the diagnostic trail. Never forwarded by the shell crate, so end-user
# builds never see it. See docs/impl-crate-split.md for the `test-util` vs
# `private-test-util` distinction.
private-test-util = []

[dependencies]

[dev-dependencies]
mutants = { workspace = true }

[lints]
workspace = true
