[package]
# Cargo has its own logic for naming and expects dashes for the `cargo-bench-history`
# binary, but its internal implementation crates use the short `cbh_` underscore prefix.
name = "cbh_storage"
description = "Implementation crate for cargo-bench-history - do not reference directly"
publish = true
version = "0.0.6"

authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

[lib]
# This is an implementation crate whose surface is documented on `cargo-bench-history`.
doc = false

[features]
# Exposes the in-memory storage fake so tests in the other cargo-bench-history
# implementation crates can drive commands against it without a filesystem or cloud
# backend. Not part of any public contract.
private-test-util = []

[dependencies]
async-trait = { workspace = true }
azure_core = { workspace = true }
azure_identity = { workspace = true, features = ["default"] }
azure_storage_blob = { workspace = true, features = ["default"] }
base64 = { workspace = true }
cbh_codec = { workspace = true }
cbh_config = { workspace = true }
cbh_diag = { workspace = true }
cbh_model = { workspace = true }
futures = { workspace = true }
jiff = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["fs", "io-util"] }

[dev-dependencies]
cbh_diag = { path = "../cbh_diag", features = ["private-test-util"] }
futures = { workspace = true, features = ["executor"] }
mutants = { workspace = true }
reqwest = { workspace = true, features = ["gzip", "rustls"] }
serial_test = { workspace = true }
tempfile = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }

[lints]
workspace = true
