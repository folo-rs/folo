[package]
name = "nm"
description = "Minimalistic high-performance metrics collection in highly concurrent environments"
publish = true
version = "0.1.38"

authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

[package.metadata.docs.rs]
all-features = true

[dependencies]
# Exact-version pin on `nm_impl`: `nm` and `nm_impl` are logically the same
# package split into two crates for cargotechnical reasons (see
# `docs/impl-crate-split.md`). We do not maintain a SemVer boundary between
# them. release-plz `version_group = "nm"` keeps their versions in lockstep
# at release time; the `=` pin enforces at the Cargo manifest level that
# downstream consumers never end up with a mismatched pair, and tells
# `cargo update` that there is no acceptable alternate version.
nm_impl = { version = "=0.1.0", path = "../nm_impl", default-features = false }

[dev-dependencies]
static_assertions = { workspace = true }

[lints]
workspace = true
