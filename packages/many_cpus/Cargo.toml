[package]
name = "many_cpus"
description = "Efficiently schedule work and inspect the hardware environment on many-processor systems"
publish = true
version = "2.4.8"

authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

[package.metadata.docs.rs]
all-features = true

# `testing` is used by the Windows-only `*_obey_job_*` examples (inside
# `#[cfg(windows)]` modules) but not by anything on Linux, so cargo-udeps
# reports it as unused there.
[package.metadata.cargo-udeps.ignore]
development = ["testing"]

[features]
default = []
# Enables test utilities including the fake platform for simulating hardware configurations.
test-util = ["many_cpus_impl/test-util"]

[dependencies]
many_cpus_impl = { workspace = true }

[dev-dependencies]
# Examples and the re-export smoke test need these to exercise the public API
# end-to-end as a user of `many_cpus` would.
new_zealand = { workspace = true }
static_assertions = { workspace = true }
testing = { path = "../testing" }

[lints]
workspace = true
