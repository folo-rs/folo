[package]
name = "nm_impl"
description = "Implementation crate for `nm` - do not reference directly"
publish = true
version = "0.1.0"

authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

[package.metadata.docs.rs]
all-features = true

[lib]
# nm_impl exists only to host the implementation of `nm` and to expose internal
# items to in-workspace tests/benches; user-facing documentation lives in `nm`.
doc = false

[features]
# Exposes `#[doc(hidden)] pub fn fake(...)` constructors on `Report`,
# `EventMetrics`, and `Histogram` for use by in-workspace tests and benchmarks
# that need to fabricate data without driving the global event registry.
#
# This feature is intentionally NOT activated by the `nm` shell crate, so
# end users who depend on `nm` never see the fabrication constructors. Only
# in-workspace dev-dependencies that need them (such as `nm_otel`'s tests
# and benches) should activate it via `nm_impl = { ..., features = ["test-util"] }`.
test-util = []

[dependencies]
fast_time = { workspace = true }
foldhash = { workspace = true }
new_zealand = { workspace = true }
num-traits = { workspace = true }

[dev-dependencies]
criterion = { workspace = true }
many_cpus = { path = "../many_cpus" }
mutants = { workspace = true }
# `nm` is a dev-dep so doctests, examples, and benches can write `use nm::Event;`
# exactly as user code would, matching the documentation rendered for `nm`.
nm = { path = "../nm" }
par_bench = { path = "../par_bench", features = ["criterion"] }
static_assertions = { workspace = true }

# Gungraun drives Valgrind-based Callgrind benchmarks; Linux-only.
[target.'cfg(target_os = "linux")'.dev-dependencies]
gungraun = { workspace = true, features = ["default"] }

[lints]
workspace = true

[[bench]]
name = "nm_performance"
harness = false

[[bench]]
name = "nm_push_bulk"
harness = false

[[bench]]
name = "nm_observe_cg"
harness = false
