[package]
# Cargo has its own logic for naming and expects dashes. Okay.
name = "cargo-bench-history"
description = "A Cargo tool that maintains a long-lived history of benchmark results and analyzes it for trends"
publish = false
version = "0.0.1"

authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

[package.metadata.docs.rs]
all-features = true

# A minimal stand-in for a benchmark engine, used by integration tests to drive
# `run` end to end: it writes Gungraun summary fixtures into the target tree and
# exits with a configurable code, exercising the real harvest and exit-code
# paths without invoking a real (and slow) benchmark engine.
[[bin]]
name = "cargo-bench-history-mock-engine"
path = "tests/support/mock_engine.rs"

[features]
# Azure Blob Storage backend. Off by default so the common build stays light;
# enabling it pulls in the Azure SDK and the crypto crates used to self-sign SAS
# tokens (for Azurite in CI and for SAS-authenticated production access).
azure = [
    "dep:azure_core",
    "dep:azure_identity",
    "dep:azure_storage_blob",
    "dep:base64",
    "dep:futures",
    "dep:hmac",
]

[dependencies]
azure_core = { workspace = true, optional = true }
# The `default` feature on these two crates is load-bearing, not gratuitous: it
# transitively enables `azure_core/default`, which selects the reqwest + rustls
# HTTP transport. Without it the SDK still compiles, but `new_http_client()`
# panics at runtime the moment any blob request is made (there is no transport),
# and neither `cargo check` nor the emulator-less test runs catch that. This is
# the same "defaults pick a backend" situation that keeps `clap` on its
# defaults. The workspace declarations keep `default-features = false`, so the
# defaults are scoped to this package alone.
azure_identity = { workspace = true, optional = true, features = ["default"] }
azure_storage_blob = { workspace = true, optional = true, features = ["default"] }
base64 = { workspace = true, optional = true, features = ["std"] }
clap = { workspace = true, features = ["derive"] }
colored = { workspace = true }
futures = { workspace = true, optional = true }
hmac = { workspace = true, optional = true }
jiff = { workspace = true, features = ["serde", "std"] }
many_cpus = { workspace = true }
rasciigraph = { workspace = true, features = ["color"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
sha2 = { workspace = true }
tick = { workspace = true, features = ["tokio"] }
tokio = { workspace = true, features = ["fs", "io-util", "macros", "process", "rt-multi-thread"] }
toml = { workspace = true, features = ["parse", "serde"] }

[dev-dependencies]
futures = { workspace = true, features = ["executor"] }
mutants = { workspace = true }
serial_test = { workspace = true }
tempfile = { workspace = true }
tick = { workspace = true, features = ["test-util"] }

[lints]
workspace = true
