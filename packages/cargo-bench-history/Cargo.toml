[package]
# Cargo has its own logic for naming and expects dashes. Okay.
name = "cargo-bench-history"
description = "A Cargo tool that maintains a long-lived history of benchmark results and analyzes it for trends"
publish = true
version = "0.0.9"

authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

[package.metadata.binstall]
# Prebuilt binaries are published by .github/workflows/release.yml (see
# docs/release-automation.md). release-plz tags releases as `<crate>-v<version>`,
# which cargo-binstall's auto-detection does not derive, so the URL is explicit.
# Archives are `.zip` on every platform and the binary sits at the archive root.
# This crate is the slowest to build from source (Azure SDK), so it benefits most
# from a prebuilt binary.
pkg-url = "{ repo }/releases/download/{ name }-v{ version }/{ name }-v{ version }-{ target }.zip"
bin-dir = "{ bin }{ binary-ext }"
pkg-fmt = "zip"

[dependencies]
cbh_analyze = { workspace = true }
cbh_cli = { workspace = true }
cbh_command = { workspace = true }
cbh_config = { workspace = true }
cbh_diag = { workspace = true }
cbh_engines = { workspace = true }
cbh_git = { workspace = true }
cbh_model = { workspace = true }
cbh_probe = { workspace = true }
cbh_storage = { workspace = true }
futures = { workspace = true }
jiff = { workspace = true, features = ["serde"] }
mimalloc = { workspace = true }
nonempty = { workspace = true }
serde_json = { workspace = true }
tick = { workspace = true, features = ["tokio"] }
tokio = { workspace = true, features = ["fs", "io-util", "macros", "rt-multi-thread"] }

[dev-dependencies]
async-trait = { workspace = true }
azure_core = { workspace = true }
# The `default` feature on these two crates is load-bearing, not gratuitous: it
# transitively enables `azure_core/default`, which selects the reqwest + rustls
# HTTP transport. Without it the SDK still compiles, but `new_http_client()`
# panics at runtime the moment any blob request is made (there is no transport),
# and neither `cargo check` nor the emulator-less test runs catch that. This is
# the same "defaults pick a backend" situation that keeps `clap` on its
# defaults. The workspace declarations keep `default-features = false`, so the
# defaults are scoped to this package alone. The Azure SDK is only a
# dev-dependency now (the `cbh_azure` end-to-end test builds a backend directly
# via `azure_backend_from_parts`); production storage lives in `cbh_storage`.
azure_identity = { workspace = true, features = ["default"] }
azure_storage_blob = { workspace = true, features = ["default"] }
base64 = { workspace = true }
cargo-bench-history-faker = { path = "../cargo-bench-history-faker", features = ["private-test-util"] }
cbh_codec = { path = "../cbh_codec" }
cbh_diag = { path = "../cbh_diag", features = ["private-test-util"] }
cbh_git = { path = "../cbh_git", features = ["private-test-util"] }
cbh_storage = { path = "../cbh_storage", features = ["private-test-util"] }
futures = { workspace = true, features = ["executor"] }
mutants = { workspace = true }
reqwest = { workspace = true, features = ["gzip", "rustls"] }
serial_test = { workspace = true }
tempfile = { workspace = true }
testing = { path = "../testing" }
tick = { workspace = true, features = ["test-util"] }

[lints]
workspace = true
