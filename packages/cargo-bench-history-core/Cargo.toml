[package]
# Cargo has its own logic for naming and expects dashes. Okay.
name = "cargo-bench-history-core"
description = "Pure data-model and analysis internals for cargo-bench-history (no I/O), split out so its fast in-process test suite can be mutation-tested cheaply"
publish = true
version = "0.0.2"

authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

[features]
# Internal-only API surface for in-workspace tests: the `testing::synchronous_spawner`
# the `cargo-bench-history` shell crate's tests (and this crate's own tests) inject in
# place of the production Tokio spawner, so neither needs a Tokio runtime. Never
# forwarded by the shell crate, so end-user builds never see it. See
# docs/impl-crate-split.md for the `test-util` vs `private-test-util` distinction.
private-test-util = ["dep:thread_aware"]

[dependencies]
anyspawn = { workspace = true }
colored = { workspace = true }
flate2 = { workspace = true }
foldhash = { workspace = true }
hashbrown = { workspace = true, features = ["default-hasher", "inline-more"] }
jiff = { workspace = true, features = ["serde"] }
nonempty = { workspace = true, features = ["serialize"] }
rasciigraph = { workspace = true, features = ["color"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
smallvec = { workspace = true, features = ["serde"] }
thread_aware = { workspace = true, optional = true, features = ["derive"] }

[dev-dependencies]
alloc_tracker = { path = "../alloc_tracker" }
criterion = { workspace = true }
futures = { workspace = true, features = ["executor"] }
mutants = { workspace = true }

# Gungraun drives Valgrind-based Callgrind benchmarks; Linux-only.
[target.'cfg(target_os = "linux")'.dev-dependencies]
gungraun = { workspace = true, features = ["default"] }

[[bench]]
name = "cbh_core_model"
harness = false

[[bench]]
name = "cbh_core_codec"
harness = false

[[bench]]
name = "cbh_core_codec_cg"
harness = false

[lints]
workspace = true
