name: Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  # PR runs supersede: a new commit cancels the outdated in-progress run, keyed on the PR
  # branch (cancel-in-progress is true for the `pull_request` event). Pushes to `main`, by
  # contrast, must NOT cancel each other - `main` is the backstop branch and files a per-run
  # failure issue, so every landed commit is validated to completion. For the `push` event
  # cancel-in-progress is false, so a new `main` push queues behind the in-progress run
  # instead of killing it: `main` validation is sequential. See design.md (Concurrency).
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name != 'push' }}

jobs:
  # Determines which packages are impacted by changes in a PR branch compared
  # to origin/main. On push to main (backstop), all packages are validated.
  delta:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.compute.outputs.packages }}
      packages_json: ${{ steps.compute.outputs.packages_json }}
      skip_all: ${{ steps.compute.outputs.skip_all }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup environment
        # The delta job runs before - and gates - every package-scoped job, so it uses the same
        # setup-environment composite as they do rather than a hand-picked minimal toolchain. That
        # keeps a single install path (cargo-delta comes from `just install-tools` like every other
        # tool) and, on a cold cache, primes the shared `prerequisites` cache this job's dependents
        # then restore instead of each recompiling from scratch. On a warm cache the setup is a
        # ~30-second restore.
        uses: ./.github/actions/setup-environment

      - name: Compute delta
        id: compute
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true

          # The cargo-delta pipeline lives in the Pester-tested Delta module, shared with the local
          # `just delta` recipe so the two cannot drift. See scripts/build/Delta.psm1.
          Import-Module ./scripts/build/Delta.psm1 -Force

          if ($env:GITHUB_EVENT_NAME -eq 'push') {
            Write-Host 'Push to main detected, running full workspace validation.'
            @(
              'packages='
              'packages_json=[]'
              'skip_all=false'
            ) | Add-Content -Path $env:GITHUB_OUTPUT -Encoding utf8
            exit 0
          }

          # Full history is already checked out (fetch-depth: 0), so -SkipFetch avoids a redundant
          # fetch; the module analyzes origin/main in a throwaway worktree and cleans up after
          # itself (no artifacts land in the checkout to dirty the tree).
          $affected = @(Invoke-CargoDelta -SkipFetch)
          $output = Get-DeltaOutput -Affected $affected

          if ($affected.Count -eq 0) {
            Write-Host 'No packages affected by changes.'
          } else {
            Write-Host "Affected packages: $($output.Packages)"
          }

          @(
            "packages=$($output.Packages)"
            "packages_json=$($output.PackagesJson)"
            "skip_all=$($output.SkipAll)"
          ) | Add-Content -Path $env:GITHUB_OUTPUT -Encoding utf8

  # PowerShell test suite for the standalone scripts under scripts/ (the release-automation and
  # binstall-validation modules), plus PSScriptAnalyzer static analysis of those scripts and the
  # binstall-metadata check on the real workspace. Runs unconditionally - independent of the
  # `delta` package analysis - because the scripts are not Cargo packages, so a change touching
  # only scripts/ would otherwise be validated by nothing; the static-analysis and binstall checks
  # ride along here because they reuse the same environment and are seconds long.
  test-scripts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-environment

      - name: Run script test suites
        run: just test-scripts

      - name: Validate scripts (PSScriptAnalyzer)
        run: just validate-scripts

      - name: Validate binstall metadata
        run: just validate-binstall

  # Validates the GitHub Actions workflow files with actionlint. Runs unconditionally - independent
  # of the `delta` package analysis - because the workflow files are not Cargo packages, so a
  # change touching only .github/workflows/ would otherwise be validated by nothing. actionlint
  # is a fast static check, so running it on every PR is cheap.
  validate-workflows:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-environment

      - name: Validate workflows
        run: just validate-workflows

  # Formatting is platform-agnostic, so run only on Ubuntu for efficiency.
  format-check:
    needs: [delta]
    if: needs.delta.outputs.skip_all != 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-environment

      - name: Run format-check
        run: just format-check

  # Default features check is platform-agnostic, so run only on Ubuntu for efficiency.
  default-features-check:
    needs: [delta]
    if: needs.delta.outputs.skip_all != 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-environment

      - name: Run default-features-check
        run: just default-features-check

  clippy-dev:
    needs: [delta]
    if: needs.delta.outputs.skip_all != 'true'
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-environment

      - name: Run clippy dev on ${{ matrix.platform }}
        run: just package="${{ needs.delta.outputs.packages }}" clippy dev

  # The x86_64 test pass (ubuntu-latest and windows-latest - both x86_64). Runs the full
  # test suite (unit, integration and example tests) with coverage instrumentation, so the
  # coverage report is a side effect of the regular test run rather than a second,
  # separately re-executed pass. Also runs the benchmark targets once to verify they do not
  # panic. Uploads both the coverage report and the test results to Codecov.
  #
  # macOS is deliberately not here: GitHub's `macos-latest` runner is Apple Silicon (arm64),
  # so macOS is exercised by the `test-arm` job instead. Keeping this job x86_64-only keeps
  # its name accurate and stops the matrix drifting as the `-latest` labels change.
  #
  # Coverage requires the nightly toolchain (llvm-tools-preview is installed only there via
  # `just install-tools`), so this is the nightly test pass. The MSRV test pass runs on the
  # ARM runners (`test-arm`, push-to-`main` only), and MSRV compilation of every target is
  # covered by `check-frozen` (which compiles all targets on MSRV against the frozen minimums).
  # Paired with `test-arm`; both carry an explicit `-x64`/`-arm` suffix for symmetry.
  test-x64:
    needs: [delta]
    if: needs.delta.outputs.skip_all != 'true'
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-environment

      - name: Run tests with coverage on ${{ matrix.platform }}
        run: |
          just package="${{ needs.delta.outputs.packages }}" coverage-measure
          just coverage-report-ci

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: true

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: target/nextest/default/junit.xml
          flags: ${{ matrix.platform }}
          report_type: test_results

      - name: Run benchmark targets on ${{ matrix.platform }}
        run: just package="${{ needs.delta.outputs.packages }}" test-benches

  # macOS is dropped on PRs (a doctest pass on macOS is rarely informative); the full
  # three-platform matrix runs on push to `main`.
  test-docs:
    needs: [delta]
    if: needs.delta.outputs.skip_all != 'true'
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJSON(github.event_name == 'push' && '["ubuntu-latest", "macos-latest", "windows-latest"]' || '["ubuntu-latest", "windows-latest"]') }}

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-environment

      - name: Run test-docs on ${{ matrix.platform }}
        run: just package="${{ needs.delta.outputs.packages }}" test-docs

  # macOS is dropped on PRs (rustdoc output does not vary by platform, so a macOS docs build
  # is rarely informative); the full three-platform matrix runs on push to `main`.
  docs:
    needs: [delta]
    if: needs.delta.outputs.skip_all != 'true'
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJSON(github.event_name == 'push' && '["ubuntu-latest", "macos-latest", "windows-latest"]' || '["ubuntu-latest", "windows-latest"]') }}

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-environment

      - name: Run docs on ${{ matrix.platform }}
        run: just package="${{ needs.delta.outputs.packages }}" docs

      - name: Run docs-default-features on ${{ matrix.platform }}
        run: just package="${{ needs.delta.outputs.packages }}" docs-default-features

  # Ubuntu is dropped on PRs: Miri is an architecture-agnostic interpreter, so the Linux run
  # is a push-to-`main`-only sanity net over the Windows pass. Both platforms run on push.
  miri-x64:
    needs: [delta, clippy-dev, test-x64]
    if: needs.delta.outputs.skip_all != 'true'
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJSON(github.event_name == 'push' && '["ubuntu-latest", "windows-latest"]' || '["windows-latest"]') }}

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-environment

      - name: Run miri on ${{ matrix.platform }}
        run: just package="${{ needs.delta.outputs.packages }}" miri

  # The ARM64 test pass (ubuntu-24.04-arm, windows-11-arm and macos-latest). Exercises
  # ARM-specific code paths (anything gated behind cfg(target_arch = "aarch64") or similar)
  # which x86_64 runners never compile or execute. macOS lives here too because GitHub's
  # `macos-latest` runner is Apple Silicon (arm64). Also serves as the MSRV test pass (the
  # x86_64 `test-x64` job runs on nightly so it can collect coverage). No coverage here:
  # llvm-tools-preview-based instrumentation is gathered on x86_64 only. Paired with
  # `test-x64`; both carry an explicit `-x64`/`-arm` suffix.
  test-arm:
    needs: [delta]
    # Push-to-`main` only: every leg here is ARM or macOS, all pruned from PR validation.
    if: github.event_name == 'push' && needs.delta.outputs.skip_all != 'true'
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-24.04-arm, windows-11-arm, macos-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-environment

      - name: Run tests on ${{ matrix.platform }}
        run: just package="${{ needs.delta.outputs.packages }}" test

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: target/nextest/default/junit.xml
          flags: ${{ matrix.platform }}
          report_type: test_results

      - name: Run benchmark targets on ${{ matrix.platform }}
        run: just package="${{ needs.delta.outputs.packages }}" test-benches

  # ARM64 coverage for Miri. Miri is an interpreter with its own memory model and is
  # architecture-agnostic for platform-neutral code; we run it on ARM purely to exercise
  # cfg(target_arch = "aarch64") (and similar) code paths under Miri's UB detection.
  miri-arm:
    needs: [delta, clippy-dev, test-arm]
    # Push-to-`main` only: an architecture-agnostic interpreter re-run on ARM is a sanity net
    # over cfg-gated paths, not PR-worthy signal.
    if: github.event_name == 'push' && needs.delta.outputs.skip_all != 'true'
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-24.04-arm, windows-11-arm]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-environment

      - name: Run miri on ${{ matrix.platform }}
        run: just package="${{ needs.delta.outputs.packages }}" miri

  # Miri with many seeds is very slow, so we only run it for select packages on Linux (these
  # exercise platform-independent code, so Linux's lower overhead is preferred over Windows).
  # These jobs only run when their specific package is affected by changes.
  # Gated behind the base `miri-x64` job so a quick Miri failure short-circuits the much more
  # expensive many-seeds run.
  miri-harder-events-once:
    needs: [delta, miri-x64]
    if: >-
      needs.delta.outputs.skip_all != 'true'
      && (needs.delta.outputs.packages == '' || contains(fromJson(needs.delta.outputs.packages_json), 'events_once'))
    strategy:
      fail-fast: false
      matrix:
        shard: [1/4, 2/4, 3/4, 4/4]
    # Many-seeds Miri work budget (~90 min) plus up to 90 min for a cold-cache setup-environment.
    timeout-minutes: 180
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-environment

      - name: Run miri-harder for events_once on ubuntu-latest (shard ${{ matrix.shard }})
        run: just package=events_once miri-harder ${{ matrix.shard }}

  miri-harder-infinity-pool:
    needs: [delta, miri-x64]
    if: >-
      needs.delta.outputs.skip_all != 'true'
      && (needs.delta.outputs.packages == '' || contains(fromJson(needs.delta.outputs.packages_json), 'infinity_pool'))
    strategy:
      fail-fast: false
      matrix:
        shard: [1/8, 2/8, 3/8, 4/8, 5/8, 6/8, 7/8, 8/8]
    # Many-seeds Miri work budget (~90 min) plus up to 90 min for a cold-cache setup-environment.
    timeout-minutes: 180
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-environment

      - name: Run miri-harder for infinity_pool on ubuntu-latest (shard ${{ matrix.shard }})
        run: just package=infinity_pool miri-harder ${{ matrix.shard }}

  miri-harder-events:
    needs: [delta, miri-x64]
    if: >-
      needs.delta.outputs.skip_all != 'true'
      && (needs.delta.outputs.packages == '' || contains(fromJson(needs.delta.outputs.packages_json), 'events'))
    strategy:
      fail-fast: false
      matrix:
        shard: [1/2, 2/2]
    # Many-seeds Miri work budget (~90 min) plus up to 90 min for a cold-cache setup-environment.
    timeout-minutes: 180
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-environment

      - name: Run miri-harder for events on ubuntu-latest (shard ${{ matrix.shard }})
        run: just package=events miri-harder ${{ matrix.shard }}

  miri-harder-awaiter-set:
    needs: [delta, miri-x64]
    if: >-
      needs.delta.outputs.skip_all != 'true'
      && (needs.delta.outputs.packages == '' || contains(fromJson(needs.delta.outputs.packages_json), 'awaiter_set'))
    strategy:
      fail-fast: false
      matrix:
        shard: [1/2, 2/2]
    # Many-seeds Miri work budget (~90 min) plus up to 90 min for a cold-cache setup-environment.
    timeout-minutes: 180
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-environment

      - name: Run miri-harder for awaiter_set on ubuntu-latest (shard ${{ matrix.shard }})
        run: just package=awaiter_set miri-harder ${{ matrix.shard }}

  machete:
    needs: [delta]
    if: needs.delta.outputs.skip_all != 'true'
    strategy:
      fail-fast: false
      matrix:
        # macos-latest intentionally excluded because maintainers lack local PC to do the necessary "dependency trial and error" on.
        platform: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-environment

      - name: Run machete on ${{ matrix.platform }}
        run: just machete

  clippy-release:
    needs: [delta, clippy-dev]
    # Push-to-`main` only: release-profile Clippy rarely diverges from the dev pass on a PR.
    if: github.event_name == 'push' && needs.delta.outputs.skip_all != 'true'
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-environment

      - name: Run clippy release on ${{ matrix.platform }}
        run: just package="${{ needs.delta.outputs.packages }}" clippy release

  build-release:
    needs: [delta, clippy-dev]
    if: needs.delta.outputs.skip_all != 'true'
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-environment

      - name: Run build release on ${{ matrix.platform }}
        run: just package="${{ needs.delta.outputs.packages }}" build release

  # Verifies the workspace still compiles at the minimum dependency versions declared in
  # Cargo.toml (our published minimum-version promises), rather than the higher versions
  # pinned in Cargo.lock. The `check-frozen` recipe freezes every workspace dependency to
  # its declared minimum, regenerates the lockfile, and runs `check`. Gated behind clippy-dev
  # because checking the frozen minimums is pointless if the code does not even build with
  # the normal lockfile versions.
  check-frozen:
    needs: [delta, clippy-dev]
    if: needs.delta.outputs.skip_all != 'true'
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-environment

      - name: Run check-frozen on ${{ matrix.platform }}
        run: just package="${{ needs.delta.outputs.packages }}" check-frozen

  mutants:
    needs: [delta, test-x64]
    if: needs.delta.outputs.skip_all != 'true'
    # Sharded mutation-testing work budget (~180 min) plus up to 90 min for a cold-cache setup-environment.
    timeout-minutes: 270
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, windows-latest]
        shard: [1/8, 2/8, 3/8, 4/8, 5/8, 6/8, 7/8, 8/8]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-environment

      - name: Run mutants on ${{ matrix.platform }} (shard ${{ matrix.shard }})
        run: just package="${{ needs.delta.outputs.packages }}" mutants ${{ matrix.shard }}

  run-examples:
    needs: [delta]
    if: needs.delta.outputs.skip_all != 'true'
    # Work budget (~90 min) plus up to 90 min for a cold-cache setup-environment.
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-environment

      - name: Run examples on ${{ matrix.platform }}
        run: just package="${{ needs.delta.outputs.packages }}" run-examples

  hack:
    needs: [delta]
    if: needs.delta.outputs.skip_all != 'true'
    # Work budget (~90 min) plus up to 90 min for a cold-cache setup-environment.
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-environment

      - name: Run hack on ${{ matrix.platform }}
        run: just package="${{ needs.delta.outputs.packages }}" hack

  careful:
    needs: [delta, test-x64]
    # Push-to-`main` only: `cargo careful` rarely surfaces PR-specific signal.
    if: github.event_name == 'push' && needs.delta.outputs.skip_all != 'true'
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-environment

      - name: Run careful on ${{ matrix.platform }}
        run: just package="${{ needs.delta.outputs.packages }}" careful

  # Azure Blob storage backend tests against the Azurite emulator.
  #
  # The Azure backend's network paths self-skip when no
  # emulator is reachable (so the multi-platform test jobs stay green
  # without one). They run for real only here: Azurite is provisioned on the host
  # and BENCH_HISTORY_REQUIRE_AZURITE turns an unreachable emulator into a hard
  # failure, so a misconfigured emulator can never silently degrade into skipping
  # every test. This job also collects coverage so the azure.rs network paths
  # reach Codecov - the multi-platform `test-x64` job runs without an emulator and
  # therefore cannot cover them; Codecov merges this azure-flagged upload with it.
  #
  # Runs on a single platform (Linux) by choice, not by limitation: the Azure Blob
  # backend is OS-agnostic network I/O (HTTP via the azure SDK), so exercising it on
  # one platform fully covers it - also running it on Windows/macOS would only
  # duplicate the same coverage. Linux is picked because it is the cheapest/fastest
  # runner and because Azurite runs directly on the host there via npm (service
  # containers cannot reliably bind it to a reachable address). Package-gated: the
  # job is only relevant when cargo-bench-history is affected.
  #
  # Named `test-azurite` because it runs against the Azurite emulator, not a real
  # Azure account; `test-azure` is reserved for a future job that targets real Azure.
  test-azurite:
    needs: [delta]
    if: >-
      needs.delta.outputs.skip_all != 'true'
      && (needs.delta.outputs.packages == '' || contains(fromJson(needs.delta.outputs.packages_json), 'cargo-bench-history'))
    runs-on: ubuntu-latest
    env:
      BENCH_HISTORY_REQUIRE_AZURITE: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-environment
        with:
          # Only this job needs the Azurite emulator, so it is the sole opt-in; every other job
          # skips its ~3-minute npm install. The start-azurite step below then just launches it.
          install-azurite: "true"

      - name: Start Azurite
        uses: ./.github/actions/start-azurite

      - name: Generate azure coverage on ubuntu-latest
        run: |
          just package=cargo-bench-history coverage-measure
          just coverage-report-ci

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          flags: azure
          fail_ci_if_error: true

  # Azure Blob storage backend tests against a real Azure Storage account.
  #
  # Complements `test-azurite` by exercising the Microsoft Entra ID authentication
  # path that the emulator (account-key/SAS) never touches: a real Storage account
  # with shared-key access disabled, reached over HTTPS, authenticated through
  # GitHub OIDC workload identity federation - no stored secret. Each test creates a
  # fresh blob container and deletes it when it finishes (even on panic); the final
  # `if: always()` sweep is a backstop for a container a crashed run might leave.
  #
  # Gated two ways so it only runs when it can succeed:
  #   * package-gated to cargo-bench-history (same gate as test-azurite);
  #   * same-repo only - a fork PR cannot mint an OIDC token for our tenant, so it
  #     would fail federation; the condition lets fork PRs skip cleanly instead.
  # The Azure identifiers it needs are committed (non-secret) in constants.env, the
  # same source `just test-azure` reads locally, so local and CI target the same
  # account. The `just test-azure` recipe sets ENABLE_AZURE=1, which is what actually
  # opts the real-Azure tests in (they self-skip without it) and turns a missing
  # account into a hard failure, so once the job runs it can never silently degrade
  # into skipping every test.
  #
  # Single-platform (Linux) by choice, not limitation: the Azure Blob backend is
  # OS-agnostic network I/O, so one platform fully covers it and Linux is the
  # cheapest runner. Unlike test-azurite it collects no coverage (azurite already
  # covers azure.rs); its value is proving the real Entra + real Blob endpoint
  # round-trip end to end.
  #
  # The account, managed identity and federated credentials are scripted/Bicep'd in
  # infra/azure-bench-history-test/ - see that directory's README to deploy or re-create.
  test-azure:
    needs: [delta]
    if: >-
      needs.delta.outputs.skip_all != 'true'
      && (needs.delta.outputs.packages == '' || contains(fromJson(needs.delta.outputs.packages_json), 'cargo-bench-history'))
      && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    # `id-token: write` lets the job mint a short-lived GitHub OIDC token (a signed
    # JWT proving "this run is repo folo-rs/folo on ref X"). `azure/login@v2` hands
    # that token to Azure, which matches it against the managed identity's federated
    # credentials (see infra/azure-bench-history-test/main.bicep) and issues an access
    # token - so CI authenticates with no stored secret. The default GITHUB_TOKEN
    # cannot request an OIDC token unless this permission is granted explicitly (and
    # fork PRs cannot get it at all, hence the same-repo gate above). `contents: read`
    # is the minimum the checkout needs.
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-environment

      # Surface the non-secret AZURE_* identity values and the account name from
      # constants.env (the same source `just test-azure` reads) as job env vars, so
      # the azure/login inputs and the cleanup step can reference them without
      # duplicating values in repo Variables. Each line is `KEY=value`; comments skip.
      - name: Load Azure identifiers from constants.env
        shell: bash
        run: grep -E '^(AZURE_TEST_CLIENT_ID|AZURE_TENANT_ID|AZURE_SUBSCRIPTION_ID|BENCH_HISTORY_TEST_AZURE_ACCOUNT)=' constants.env >> "$GITHUB_ENV"

      - name: Sign in to Azure (OIDC workload identity federation)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_TEST_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Run real-Azure storage tests
        run: just test-azure

      - name: Delete leaked test containers
        if: always()
        shell: pwsh
        # cleanup-containers.ps1 defaults its account to BENCH_HISTORY_TEST_AZURE_ACCOUNT,
        # which the load step above put into the job env. Each test already deletes its
        # own container when it finishes, so this backstop only needs to sweep containers
        # leaked by a crashed or timed-out run. test-azure and test-azure-gh run
        # concurrently against the same account, so -MinAgeMinutes keeps this sweep from
        # deleting the sibling job's still-in-use (freshly written) containers; a genuine
        # leak is older than the cutoff and gets swept here or on a later run.
        run: ./infra/azure-bench-history-test/cleanup-containers.ps1 -MinAgeMinutes 180

  # Variant of test-azure that exercises cargo-bench-history's SELF-MINTING GitHub
  # OIDC credential - the exact credential the prod collection (bench-history.yml)
  # depends on - against the real test account. The unit tests in storage/github_oidc.rs
  # stub the HTTP exchange, and test-azure above takes the local-az DeveloperToolsCredential
  # fallback, so without this job nothing would prove the self-minting path actually
  # round-trips real GitHub OIDC -> Entra -> Blob until the post-merge collection run.
  #
  # The only difference from test-azure is exporting AZURE_CLIENT_ID: setting it is the
  # switch that makes from_config build a ClientAssertionCredential (which mints a fresh
  # OIDC JWT per token exchange) instead of the DeveloperToolsCredential it would use
  # otherwise. azure/login is retained ONLY so the test harness's container cleanup
  # (which shells out to `az`) works; the code under test ignores the az session once
  # AZURE_CLIENT_ID is set.
  test-azure-gh:
    needs: [delta]
    if: >-
      needs.delta.outputs.skip_all != 'true'
      && (needs.delta.outputs.packages == '' || contains(fromJson(needs.delta.outputs.packages_json), 'cargo-bench-history'))
      && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    # `id-token: write` injects the ACTIONS_ID_TOKEN_REQUEST_URL/TOKEN values that the
    # tool itself reads to mint OIDC assertions on demand (the prod-critical path), and
    # the test identity's `pull_request` federated credential lets same-repo PR runs
    # federate in. Fork PRs cannot get an OIDC token for our tenant, hence the same-repo
    # gate above. `contents: read` is the minimum the checkout needs.
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-environment

      - name: Load Azure identifiers from constants.env
        shell: bash
        run: grep -E '^(AZURE_TEST_CLIENT_ID|AZURE_TENANT_ID|AZURE_SUBSCRIPTION_ID|BENCH_HISTORY_TEST_AZURE_ACCOUNT)=' constants.env >> "$GITHUB_ENV"

      # Setting AZURE_CLIENT_ID (to the test identity's client id) is what makes
      # cargo-bench-history take its self-minting OIDC path. AZURE_TEST_CLIENT_ID was
      # placed in the job env by the previous step, so it is readable here.
      - name: Select the self-minting OIDC credential
        shell: bash
        run: echo "AZURE_CLIENT_ID=$AZURE_TEST_CLIENT_ID" >> "$GITHUB_ENV"

      # The tool self-mints regardless of this login; it exists only so the test
      # harness's `az`-based container cleanup has a session to use.
      - name: Sign in to Azure (for harness container cleanup only)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_TEST_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Run real-Azure storage tests via the self-minting OIDC credential
        run: just test-azure

      - name: Delete leaked test containers
        if: always()
        shell: pwsh
        # cleanup-containers.ps1 defaults its account to BENCH_HISTORY_TEST_AZURE_ACCOUNT,
        # which the load step above put into the job env. Each test already deletes its
        # own container when it finishes, so this backstop only needs to sweep containers
        # leaked by a crashed or timed-out run. test-azure and test-azure-gh run
        # concurrently against the same account, so -MinAgeMinutes keeps this sweep from
        # deleting the sibling job's still-in-use (freshly written) containers; a genuine
        # leak is older than the cutoff and gets swept here or on a later run.
        run: ./infra/azure-bench-history-test/cleanup-containers.ps1 -MinAgeMinutes 180

  # Releases Codecov's coverage notifications once every coverage upload for this
  # commit has landed.
  #
  # Coverage data arrives from several jobs: one upload per platform from the
  # `test-x64` matrix, plus a conditional `azure`-flagged upload from `test-azurite`
  # when cargo-bench-history is affected. The per-commit upload count is therefore
  # variable. codecov.yml sets `codecov.notify.manual_trigger: true`, so Codecov posts
  # NO coverage status or PR comment until this job runs the CLI `send-notifications`
  # command - which it does only after every coverage-producing job has finished. That
  # way Codecov computes the status from the complete set of uploads instead of
  # reporting a misleadingly low figure off a partial set (see codecov.yml for the
  # full rationale and why this is preferred over a hardcoded `after_n_builds`).
  #
  # It depends on `test-x64` and `test-azurite` (the only coverage producers;
  # `test-azure` / `test-azure-gh` upload none). The `!cancelled()` status function lets
  # it run even when `test-azurite` is skipped - without a status function a skipped
  # dependency would skip this job too. It releases notifications only when every expected
  # upload actually landed: `test-x64` must have succeeded, and `test-azurite` must have
  # either succeeded (its azure upload landed) or been skipped (cargo-bench-history not
  # affected, so no azure upload was expected). If `test-x64` failed, or `test-azurite`
  # ran and failed, an expected upload is missing and the build is already red - so we do
  # NOT release a status off an incomplete set, which would post the very "coverage
  # decreased" result this gate exists to prevent. A `skip_all` run uploads no coverage at
  # all, so `test-x64` is skipped and this job does not run.
  #
  # Like the upload jobs, this runs for fork PRs too: the token is empty there and the
  # action falls back to tokenless notification (this is a public repository), so
  # external-contributor PRs get the same gated, complete-data coverage status.
  coverage-notify:
    needs: [test-x64, test-azurite]
    if: >-
      !cancelled()
      && needs.test-x64.result == 'success'
      && (needs.test-azurite.result == 'success' || needs.test-azurite.result == 'skipped')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Release Codecov coverage notifications
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          run_command: send-notifications
          fail_ci_if_error: true

  # File a GitHub issue whenever any job above fails on a push to `main`, so a push-to-main
  # failure is tracked rather than lost. PR runs surface a failure as the red check and need
  # no issue - and this workflow now leans more heavily on push-to-main as the backstop for
  # the checks pruned from PR validation (ARM, macOS test/docs, the Linux Miri run,
  # clippy-release, careful), so a green PR no longer implies those passed.
  #
  # A fresh issue is filed per failing run - no dedup, no auto-close - mirroring the release
  # workflow's per-run alert: each failure is investigated and closed individually, and a
  # later green run does not touch prior issues. `failure()` fires only on a real failure, so
  # a fully-green (or skipped-only) run files nothing. `needs` lists every job so a failure in
  # any of them reaches this gate.
  alert:
    needs:
      - delta
      - test-scripts
      - validate-workflows
      - format-check
      - default-features-check
      - clippy-dev
      - test-x64
      - test-docs
      - docs
      - miri-x64
      - test-arm
      - miri-arm
      - miri-harder-events-once
      - miri-harder-infinity-pool
      - miri-harder-events
      - miri-harder-awaiter-set
      - machete
      - clippy-release
      - build-release
      - check-frozen
      - mutants
      - run-examples
      - hack
      - careful
      - test-azurite
      - test-azure
      - test-azure-gh
      - coverage-notify
    if: failure() && github.repository == 'folo-rs/folo' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      issues: write

    steps:
      - name: Open failure issue for this run
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true

          # Ensure the shared label exists (idempotent) so `gh issue create` cannot fail on a
          # missing label.
          $PSNativeCommandUseErrorActionPreference = $false
          gh label create ci-failure --color B60205 --description "CI workflow failure" --force *> $null
          $PSNativeCommandUseErrorActionPreference = $true

          $body = @"
          The Validation workflow failed on a push to ``main``.

          Push-to-``main`` validation is the backstop for the checks pruned from PR validation
          (ARM and macOS test/docs runs, the Linux Miri sanity run, ``clippy-release`` and
          ``careful``), so this failure may be in a check a PR never ran.

          Failed run: $env:RUN_URL
          "@
          gh issue create --label ci-failure --title "Validation workflow failed (run $env:RUN_ID)" --body $body
