name: Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  # Determines which packages are impacted by changes in a PR branch compared
  # to origin/main. On push to main (backstop), all packages are validated.
  delta:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.compute.outputs.packages }}
      packages_json: ${{ steps.compute.outputs.packages_json }}
      skip_all: ${{ steps.compute.outputs.skip_all }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: cargo-delta
          # See setup-environment/action.yml for the rationale behind including
          # the runner image version in the cache key.
          env-vars: ImageVersion

      - name: Install cargo-delta
        run: cargo install cargo-delta --locked

      - name: Compute delta
        id: compute
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "Push to main detected, running full workspace validation."
            echo "packages=" >> $GITHUB_OUTPUT
            echo "packages_json=[]" >> $GITHUB_OUTPUT
            echo "skip_all=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          CONFIG_PATH="$(pwd)/delta.toml"
          WORKTREE_DIR="$(mktemp -d)"
          BASELINE_JSON="$(mktemp)"

          cleanup_worktree() {
            git worktree remove "$WORKTREE_DIR" --force >/dev/null 2>&1 || true
            rm -rf "$WORKTREE_DIR" >/dev/null 2>&1 || true
            rm -f "$BASELINE_JSON" >/dev/null 2>&1 || true
          }
          trap cleanup_worktree EXIT

          echo "Analyzing current branch..."
          cargo delta -c "$CONFIG_PATH" analyze > current.json

          echo "Analyzing baseline (origin/main)..."
          git worktree add "$WORKTREE_DIR" origin/main
          pushd "$WORKTREE_DIR"
          cargo delta -c "$CONFIG_PATH" analyze > "$BASELINE_JSON"
          popd
          git worktree remove "$WORKTREE_DIR" --force

          echo "Computing delta..."
          cargo delta -c "$CONFIG_PATH" run --baseline "$BASELINE_JSON" --current current.json > delta.json

          cat delta.json

          PACKAGES=$(jq -r '.Affected // [] | join(" ")' delta.json)
          PACKAGES_JSON=$(jq -c '.Affected // []' delta.json)

          if [ -z "$PACKAGES" ]; then
            echo "No packages affected by changes."
            echo "packages=" >> $GITHUB_OUTPUT
            echo "packages_json=[]" >> $GITHUB_OUTPUT
            echo "skip_all=true" >> $GITHUB_OUTPUT
          else
            echo "Affected packages: $PACKAGES"
            echo "packages=$PACKAGES" >> $GITHUB_OUTPUT
            echo "packages_json=$PACKAGES_JSON" >> $GITHUB_OUTPUT
            echo "skip_all=false" >> $GITHUB_OUTPUT
          fi

  # Formatting is platform-agnostic, so run only on Ubuntu for efficiency.
  format-check:
    needs: [delta]
    if: needs.delta.outputs.skip_all != 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-environment

      - name: Run format-check
        run: just format-check

  # Default features check is platform-agnostic, so run only on Ubuntu for efficiency.
  default-features-check:
    needs: [delta]
    if: needs.delta.outputs.skip_all != 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-environment

      - name: Run default-features-check
        run: just default-features-check

  check-dev:
    needs: [delta]
    if: needs.delta.outputs.skip_all != 'true'
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-environment

      - name: Run check dev on ${{ matrix.platform }}
        run: just package="${{ needs.delta.outputs.packages }}" check dev

  clippy-dev:
    needs: [delta]
    if: needs.delta.outputs.skip_all != 'true'
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-environment

      - name: Run clippy dev on ${{ matrix.platform }}
        run: just package="${{ needs.delta.outputs.packages }}" clippy dev

  # The x86_64 test pass. Runs the full test suite (unit, integration and example tests)
  # with coverage instrumentation, so the coverage report is a side effect of the regular
  # test run rather than a second, separately re-executed pass. Also runs the benchmark
  # targets once to verify they do not panic. Uploads both the coverage report and the
  # test results to Codecov.
  #
  # Coverage requires the nightly toolchain (llvm-tools-preview is installed only there via
  # `just install-tools`), so this is the nightly test pass. The MSRV test pass runs on the
  # ARM runners (`test-arm`), and MSRV compilation of every target is covered by `check-dev`.
  # Paired with `test-arm`; both carry an explicit `-x64`/`-arm` suffix for symmetry.
  test-x64:
    needs: [delta]
    if: needs.delta.outputs.skip_all != 'true'
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-environment

      - name: Run tests with coverage on ${{ matrix.platform }}
        run: |
          just package="${{ needs.delta.outputs.packages }}" coverage-measure
          just coverage-report-ci

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: true

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: target/nextest/default/junit.xml
          flags: ${{ matrix.platform }}
          report_type: test_results

      - name: Run benchmark targets on ${{ matrix.platform }}
        run: just package="${{ needs.delta.outputs.packages }}" test-benches

  test-docs:
    needs: [delta]
    if: needs.delta.outputs.skip_all != 'true'
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-environment

      - name: Run test-docs on ${{ matrix.platform }}
        run: just package="${{ needs.delta.outputs.packages }}" test-docs

  docs:
    needs: [delta]
    if: needs.delta.outputs.skip_all != 'true'
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-environment

      - name: Run docs on ${{ matrix.platform }}
        run: just package="${{ needs.delta.outputs.packages }}" docs

      - name: Run docs-default-features on ${{ matrix.platform }}
        run: just package="${{ needs.delta.outputs.packages }}" docs-default-features

  miri-x64:
    needs: [delta, check-dev, test-x64]
    if: needs.delta.outputs.skip_all != 'true'
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-environment

      - name: Run miri on ${{ matrix.platform }}
        run: just package="${{ needs.delta.outputs.packages }}" miri

  # The ARM64 test pass. Exercises ARM-specific code paths (anything gated behind
  # cfg(target_arch = "aarch64") or similar) which x86_64 runners never compile or execute,
  # and serves as the MSRV test pass (the x86_64 `test-x64` job runs on nightly so it can
  # collect coverage). No coverage here: llvm-tools-preview-based instrumentation is gathered
  # on x86_64 only. Paired with `test-x64`; both carry an explicit `-x64`/`-arm` suffix.
  test-arm:
    needs: [delta]
    if: needs.delta.outputs.skip_all != 'true'
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-24.04-arm, windows-11-arm]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-environment

      - name: Run tests on ${{ matrix.platform }}
        run: just package="${{ needs.delta.outputs.packages }}" test

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: target/nextest/default/junit.xml
          flags: ${{ matrix.platform }}
          report_type: test_results

      - name: Run benchmark targets on ${{ matrix.platform }}
        run: just package="${{ needs.delta.outputs.packages }}" test-benches

  # ARM64 coverage for Miri. Miri is an interpreter with its own memory model and is
  # architecture-agnostic for platform-neutral code; we run it on ARM purely to exercise
  # cfg(target_arch = "aarch64") (and similar) code paths under Miri's UB detection.
  miri-arm:
    needs: [delta, check-dev, test-arm]
    if: needs.delta.outputs.skip_all != 'true'
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-24.04-arm, windows-11-arm]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-environment

      - name: Run miri on ${{ matrix.platform }}
        run: just package="${{ needs.delta.outputs.packages }}" miri

  # Miri with many seeds is very slow, so we only run it for select packages on Windows.
  # These jobs only run when their specific package is affected by changes.
  # Gated behind the base `miri-x64` and `miri-arm` jobs so a quick Miri failure short-circuits
  # the much more expensive many-seeds run.
  miri-harder-events-once:
    needs: [delta, miri-x64, miri-arm]
    if: >-
      needs.delta.outputs.skip_all != 'true'
      && (needs.delta.outputs.packages == '' || contains(fromJson(needs.delta.outputs.packages_json), 'events_once'))
    strategy:
      fail-fast: false
      matrix:
        shard: [1/4, 2/4, 3/4, 4/4]
    timeout-minutes: 90
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-environment

      - name: Run miri-harder for events_once on windows-latest (shard ${{ matrix.shard }})
        run: just package=events_once miri-harder ${{ matrix.shard }}

  miri-harder-infinity-pool:
    needs: [delta, miri-x64, miri-arm]
    if: >-
      needs.delta.outputs.skip_all != 'true'
      && (needs.delta.outputs.packages == '' || contains(fromJson(needs.delta.outputs.packages_json), 'infinity_pool'))
    strategy:
      fail-fast: false
      matrix:
        shard: [1/8, 2/8, 3/8, 4/8, 5/8, 6/8, 7/8, 8/8]
    timeout-minutes: 90
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-environment

      - name: Run miri-harder for infinity_pool on windows-latest (shard ${{ matrix.shard }})
        run: just package=infinity_pool miri-harder ${{ matrix.shard }}

  miri-harder-events:
    needs: [delta, miri-x64, miri-arm]
    if: >-
      needs.delta.outputs.skip_all != 'true'
      && (needs.delta.outputs.packages == '' || contains(fromJson(needs.delta.outputs.packages_json), 'events'))
    strategy:
      fail-fast: false
      matrix:
        shard: [1/2, 2/2]
    timeout-minutes: 90
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-environment

      - name: Run miri-harder for events on windows-latest (shard ${{ matrix.shard }})
        run: just package=events miri-harder ${{ matrix.shard }}

  miri-harder-awaiter-set:
    needs: [delta, miri-x64, miri-arm]
    if: >-
      needs.delta.outputs.skip_all != 'true'
      && (needs.delta.outputs.packages == '' || contains(fromJson(needs.delta.outputs.packages_json), 'awaiter_set'))
    strategy:
      fail-fast: false
      matrix:
        shard: [1/2, 2/2]
    timeout-minutes: 90
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-environment

      - name: Run miri-harder for awaiter_set on windows-latest (shard ${{ matrix.shard }})
        run: just package=awaiter_set miri-harder ${{ matrix.shard }}

  machete:
    needs: [delta]
    if: needs.delta.outputs.skip_all != 'true'
    strategy:
      fail-fast: false
      matrix:
        # macos-latest intentionally excluded because maintainers lack local PC to do the necessary "dependency trial and error" on.
        platform: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-environment

      - name: Run machete on ${{ matrix.platform }}
        run: just machete

  check-release:
    needs: [delta, check-dev]
    if: needs.delta.outputs.skip_all != 'true'
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-environment

      - name: Run check release on ${{ matrix.platform }}
        run: just package="${{ needs.delta.outputs.packages }}" check release

  clippy-release:
    needs: [delta, clippy-dev]
    if: needs.delta.outputs.skip_all != 'true'
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-environment

      - name: Run clippy release on ${{ matrix.platform }}
        run: just package="${{ needs.delta.outputs.packages }}" clippy release

  build-release:
    needs: [delta, check-dev]
    if: needs.delta.outputs.skip_all != 'true'
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-environment

      - name: Run build release on ${{ matrix.platform }}
        run: just package="${{ needs.delta.outputs.packages }}" build release

  # Verifies the workspace still compiles at the minimum dependency versions declared in
  # Cargo.toml (our published minimum-version promises), rather than the higher versions
  # pinned in Cargo.lock. The `check-frozen` recipe freezes every workspace dependency to
  # its declared minimum, regenerates the lockfile, and runs `check`. Gated behind check-dev
  # because checking the frozen minimums is pointless if the code does not even build with
  # the normal lockfile versions.
  check-frozen:
    needs: [delta, check-dev]
    if: needs.delta.outputs.skip_all != 'true'
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-environment

      - name: Run check-frozen on ${{ matrix.platform }}
        run: just package="${{ needs.delta.outputs.packages }}" check-frozen

  mutants:
    needs: [delta, test-x64]
    if: needs.delta.outputs.skip_all != 'true'
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, windows-latest]
        shard: [1/16, 2/16, 3/16, 4/16, 5/16, 6/16, 7/16, 8/16, 9/16, 10/16, 11/16, 12/16, 13/16, 14/16, 15/16, 16/16]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-environment

      - name: Run mutants on ${{ matrix.platform }} (shard ${{ matrix.shard }})
        run: just package="${{ needs.delta.outputs.packages }}" mutants ${{ matrix.shard }}

  run-examples:
    needs: [delta]
    if: needs.delta.outputs.skip_all != 'true'
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-environment

      - name: Run examples on ${{ matrix.platform }}
        run: just package="${{ needs.delta.outputs.packages }}" run-examples

  hack:
    needs: [delta]
    if: needs.delta.outputs.skip_all != 'true'
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-environment

      - name: Run hack on ${{ matrix.platform }}
        run: just package="${{ needs.delta.outputs.packages }}" hack

  careful:
    needs: [delta, test-x64]
    if: needs.delta.outputs.skip_all != 'true'
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-environment

      - name: Run careful on ${{ matrix.platform }}
        run: just package="${{ needs.delta.outputs.packages }}" careful

  # Azure Blob storage backend tests against the Azurite emulator.
  #
  # The Azure backend's network paths self-skip when no
  # emulator is reachable (so the multi-platform test jobs stay green
  # without one). They run for real only here: Azurite is provisioned on the host
  # and BENCH_HISTORY_REQUIRE_AZURITE turns an unreachable emulator into a hard
  # failure, so a misconfigured emulator can never silently degrade into skipping
  # every test. This job also collects coverage so the azure.rs network paths
  # reach Codecov — the multi-platform `test-x64` job runs without an emulator and
  # therefore cannot cover them; Codecov merges this azure-flagged upload with it.
  #
  # Runs on a single platform (Linux) by choice, not by limitation: the Azure Blob
  # backend is OS-agnostic network I/O (HTTP via the azure SDK), so exercising it on
  # one platform fully covers it — also running it on Windows/macOS would only
  # duplicate the same coverage. Linux is picked because it is the cheapest/fastest
  # runner and because Azurite runs directly on the host there via npm (service
  # containers cannot reliably bind it to a reachable address). Package-gated: the
  # job is only relevant when cargo-bench-history is affected.
  #
  # Named `test-azurite` because it runs against the Azurite emulator, not a real
  # Azure account; `test-azure` is reserved for a future job that targets real Azure.
  test-azurite:
    needs: [delta]
    if: >-
      needs.delta.outputs.skip_all != 'true'
      && (needs.delta.outputs.packages == '' || contains(fromJson(needs.delta.outputs.packages_json), 'cargo-bench-history'))
    runs-on: ubuntu-latest
    env:
      BENCH_HISTORY_REQUIRE_AZURITE: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-environment

      - name: Start Azurite
        uses: ./.github/actions/start-azurite

      - name: Generate azure coverage on ubuntu-latest
        run: |
          just package=cargo-bench-history coverage-measure
          just coverage-report-ci

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          flags: azure
          fail_ci_if_error: true

  # Azure Blob storage backend tests against a real Azure Storage account.
  #
  # Complements `test-azurite` by exercising the Microsoft Entra ID authentication
  # path that the emulator (account-key/SAS) never touches: a real Storage account
  # with shared-key access disabled, reached over HTTPS, authenticated through
  # GitHub OIDC workload identity federation — no stored secret. Each test creates a
  # fresh blob container and deletes it when it finishes (even on panic); the final
  # `if: always()` sweep is a backstop for a container a crashed run might leave.
  #
  # Gated two ways so it only runs when it can succeed:
  #   * package-gated to cargo-bench-history (same gate as test-azurite);
  #   * same-repo only — a fork PR cannot mint an OIDC token for our tenant, so it
  #     would fail federation; the condition lets fork PRs skip cleanly instead.
  # The Azure identifiers it needs are committed (non-secret) in constants.env, the
  # same source `just test-azure` reads locally, so local and CI target the same
  # account. The `just test-azure` recipe sets ENABLE_AZURE=1, which is what actually
  # opts the real-Azure tests in (they self-skip without it) and turns a missing
  # account into a hard failure, so once the job runs it can never silently degrade
  # into skipping every test.
  #
  # Single-platform (Linux) by choice, not limitation: the Azure Blob backend is
  # OS-agnostic network I/O, so one platform fully covers it and Linux is the
  # cheapest runner. Unlike test-azurite it collects no coverage (azurite already
  # covers azure.rs); its value is proving the real Entra + real Blob endpoint
  # round-trip end to end.
  #
  # The account, managed identity and federated credentials are scripted/Bicep'd in
  # infra/azure-bench-history-test/ — see that directory's README to deploy or re-create.
  test-azure:
    needs: [delta]
    if: >-
      needs.delta.outputs.skip_all != 'true'
      && (needs.delta.outputs.packages == '' || contains(fromJson(needs.delta.outputs.packages_json), 'cargo-bench-history'))
      && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    # `id-token: write` lets the job mint a short-lived GitHub OIDC token (a signed
    # JWT proving "this run is repo folo-rs/folo on ref X"). `azure/login@v2` hands
    # that token to Azure, which matches it against the managed identity's federated
    # credentials (see infra/azure-bench-history-test/main.bicep) and issues an access
    # token — so CI authenticates with no stored secret. The default GITHUB_TOKEN
    # cannot request an OIDC token unless this permission is granted explicitly (and
    # fork PRs cannot get it at all, hence the same-repo gate above). `contents: read`
    # is the minimum the checkout needs.
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-environment

      # Surface the non-secret AZURE_* identity values and the account name from
      # constants.env (the same source `just test-azure` reads) as job env vars, so
      # the azure/login inputs and the cleanup step can reference them without
      # duplicating values in repo Variables. Each line is `KEY=value`; comments skip.
      - name: Load Azure identifiers from constants.env
        shell: bash
        run: grep -E '^(AZURE_TEST_CLIENT_ID|AZURE_TENANT_ID|AZURE_SUBSCRIPTION_ID|BENCH_HISTORY_TEST_AZURE_ACCOUNT)=' constants.env >> "$GITHUB_ENV"

      - name: Sign in to Azure (OIDC workload identity federation)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_TEST_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Run real-Azure storage tests
        run: just test-azure

      - name: Delete leaked test containers
        if: always()
        shell: pwsh
        # cleanup-containers.ps1 defaults its account to BENCH_HISTORY_TEST_AZURE_ACCOUNT,
        # which the load step above put into the job env. Each test already deletes its
        # own container when it finishes, so this backstop only needs to sweep containers
        # leaked by a crashed or timed-out run. test-azure and test-azure-gh run
        # concurrently against the same account, so -MinAgeMinutes keeps this sweep from
        # deleting the sibling job's still-in-use (freshly written) containers; a genuine
        # leak is older than the cutoff and gets swept here or on a later run.
        run: ./infra/azure-bench-history-test/cleanup-containers.ps1 -MinAgeMinutes 180

  # Variant of test-azure that exercises cargo-bench-history's SELF-MINTING GitHub
  # OIDC credential — the exact credential the nightly prod collection (bench-history.yml)
  # depends on — against the real test account. The unit tests in storage/github_oidc.rs
  # stub the HTTP exchange, and test-azure above takes the local-az DeveloperToolsCredential
  # fallback, so without this job nothing would prove the self-minting path actually
  # round-trips real GitHub OIDC -> Entra -> Blob until the post-merge nightly run.
  #
  # The only difference from test-azure is exporting AZURE_CLIENT_ID: setting it is the
  # switch that makes from_config build a ClientAssertionCredential (which mints a fresh
  # OIDC JWT per token exchange) instead of the DeveloperToolsCredential it would use
  # otherwise. azure/login is retained ONLY so the test harness's container cleanup
  # (which shells out to `az`) works; the code under test ignores the az session once
  # AZURE_CLIENT_ID is set.
  test-azure-gh:
    needs: [delta]
    if: >-
      needs.delta.outputs.skip_all != 'true'
      && (needs.delta.outputs.packages == '' || contains(fromJson(needs.delta.outputs.packages_json), 'cargo-bench-history'))
      && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    # `id-token: write` injects the ACTIONS_ID_TOKEN_REQUEST_URL/TOKEN values that the
    # tool itself reads to mint OIDC assertions on demand (the prod-critical path), and
    # the test identity's `pull_request` federated credential lets same-repo PR runs
    # federate in. Fork PRs cannot get an OIDC token for our tenant, hence the same-repo
    # gate above. `contents: read` is the minimum the checkout needs.
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-environment

      - name: Load Azure identifiers from constants.env
        shell: bash
        run: grep -E '^(AZURE_TEST_CLIENT_ID|AZURE_TENANT_ID|AZURE_SUBSCRIPTION_ID|BENCH_HISTORY_TEST_AZURE_ACCOUNT)=' constants.env >> "$GITHUB_ENV"

      # Setting AZURE_CLIENT_ID (to the test identity's client id) is what makes
      # cargo-bench-history take its self-minting OIDC path. AZURE_TEST_CLIENT_ID was
      # placed in the job env by the previous step, so it is readable here.
      - name: Select the self-minting OIDC credential
        shell: bash
        run: echo "AZURE_CLIENT_ID=$AZURE_TEST_CLIENT_ID" >> "$GITHUB_ENV"

      # The tool self-mints regardless of this login; it exists only so the test
      # harness's `az`-based container cleanup has a session to use.
      - name: Sign in to Azure (for harness container cleanup only)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_TEST_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Run real-Azure storage tests via the self-minting OIDC credential
        run: just test-azure

      - name: Delete leaked test containers
        if: always()
        shell: pwsh
        # cleanup-containers.ps1 defaults its account to BENCH_HISTORY_TEST_AZURE_ACCOUNT,
        # which the load step above put into the job env. Each test already deletes its
        # own container when it finishes, so this backstop only needs to sweep containers
        # leaked by a crashed or timed-out run. test-azure and test-azure-gh run
        # concurrently against the same account, so -MinAgeMinutes keeps this sweep from
        # deleting the sibling job's still-in-use (freshly written) containers; a genuine
        # leak is older than the cutoff and gets swept here or on a later run.
        run: ./infra/azure-bench-history-test/cleanup-containers.ps1 -MinAgeMinutes 180
