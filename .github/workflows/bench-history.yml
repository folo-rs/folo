name: Benchmark history

# Per-commit collection of the workspace's benchmark results into the long-lived Azure
# history store (account folohistory, baked into .cargo/bench_history.toml; see also
# infra/azure-bench-history-prod/). Each push to `main` benchmarks the whole workspace
# EXCEPT the slow, special-purpose `benchmarks` package, on every supported OS/architecture,
# and appends the results keyed by the pushed commit. Over time this builds the performance
# history that `cargo-bench-history analyze` reads to spot regressions.
#
# Runs per-push rather than on a nightly schedule: a nightly run re-benchmarks an unchanged
# tip for no gain and misses intermediate same-day commits, whereas per-push collects one
# data point per commit. The trade-off is more runner time on busy days.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Group by the commit SHA, not the ref. Distinct commits must collect in parallel — each is
# its own history data point, and cancelling one to favour a newer commit would drop that
# commit's measurements, defeating the per-commit goal (so the usual ref-keyed
# cancel-in-progress from validation.yml would be wrong here). cancel-in-progress therefore
# only dedups a redundant re-trigger of the SAME commit (a re-run, or a workflow_dispatch on
# an already-pushed commit), which `--skip-existing` would make a no-op append anyway.
concurrency:
  group: ${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: true

# Title of the rolling failure-alert issue, defined once and shared by the two jobs that
# reference it: the `alert` job stamps it as the issue title (via the
# .github/bench-history-failure-issue.md front matter, which create-an-issue renders with
# `{{ env.FAILURE_ISSUE_TITLE }}`), and the `resolve` job matches on it to close that issue.
# create-an-issue dedups solely by exact title, so this string is the alert's identity; a
# single definition keeps the open and close paths from drifting apart.
env:
  FAILURE_ISSUE_TITLE: Benchmark-history workflow failed

jobs:
  collect:
    # Skip everywhere the OIDC sign-in cannot work: forks (only this repository's
    # identity can federate into Azure) and any ref other than main (the federated
    # credential is scoped to refs/heads/main, so a workflow_dispatch from a feature
    # branch would mint a non-matching subject and fail at azure/login). Gating here
    # makes such manual runs skip cleanly instead of failing red.
    if: github.repository == 'folo-rs/folo' && github.ref == 'refs/heads/main'

    strategy:
      # One platform's benchmarks failing must not abandon the others' history for this
      # commit; each platform stores into its own partition independently.
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, windows-latest, ubuntu-24.04-arm, windows-11-arm]

    runs-on: ${{ matrix.platform }}
    # Generous ceiling: the suite already takes a while and grows as benchmarks are
    # added; the matrix runs in parallel, so a high cap only bounds a genuinely stuck
    # run rather than the expected duration.
    timeout-minutes: 360

    # `id-token: write` lets cargo-bench-history mint short-lived GitHub OIDC tokens
    # (each a signed JWT proving "this run is repo folo-rs/folo on ref refs/heads/main").
    # The tool exchanges them directly with Entra, which matches each against the
    # dedicated prod managed identity's `main`-branch federated credential (created by
    # infra/azure-bench-history-prod/) and issues an access token — so CI authenticates
    # with no stored secret. Minting on demand (rather than once up front via
    # `azure/login`) is what keeps a multi-hour run authenticated past the ~1h
    # access-token lifetime. `contents: read` is the minimum the checkout needs.
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-environment

      # cargo-bench-history self-federates with GitHub OIDC: given the managed identity's
      # client id and tenant — plus the ACTIONS_ID_TOKEN_* values GitHub injects because
      # of id-token: write — it mints a fresh OIDC assertion each time Entra needs a new
      # access token, so a long run never re-submits an expired assertion. Export those
      # two identifiers from constants.env under the standard names the tool reads
      # (AZURE_PROD_CLIENT_ID is the prod identity's client id). The data store account
      # name is NOT needed here: it is baked into the committed .cargo/bench_history.toml.
      - name: Configure Azure federation identity from constants.env
        shell: bash
        run: |
          set -euo pipefail
          source constants.env
          {
            echo "AZURE_CLIENT_ID=$AZURE_PROD_CLIENT_ID"
            echo "AZURE_TENANT_ID=$AZURE_TENANT_ID"
          } >> "$GITHUB_ENV"

      # The deterministic engines (Callgrind, allocation/time counters) are
      # hardware-independent; the wall-clock engines auto-detect a per-machine partition.
      - name: Collect benchmark history
        run: just gh-collect-bench-history

  analyze:
    # Survey the freshly-updated history for regressions and post a rolling issue when
    # any finding survives. Runs after every platform finishes (even partially:
    # fail-fast is off) so this commit's analysis reflects whatever did land, and only on
    # main (where OIDC sign-in works), matching collect's gate.
    needs: collect
    if: always() && github.repository == 'folo-rs/folo' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # Analysis loads the whole store and reduces it; generous like collect, though it is
    # far faster than benchmarking.
    timeout-minutes: 60

    # id-token to self-federate with Entra (reads the history; see collect's note),
    # contents for checkout, issues to file the rolling regression issue.
    permissions:
      id-token: write
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        # Full history: analyze walks first-parent commits to map stored runs to
        # committer timestamps; a shallow clone would hide most commits and skew it.
        with:
          fetch-depth: 0

      - name: Setup environment
        uses: ./.github/actions/setup-environment

      # Same self-federation as collect: export the prod identity's client id and tenant
      # under the standard names cargo-bench-history reads, then let the tool mint OIDC
      # assertions on demand (no azure/login). The account name is baked into config.
      - name: Configure Azure federation identity from constants.env
        shell: bash
        run: |
          set -euo pipefail
          source constants.env
          {
            echo "AZURE_CLIENT_ID=$AZURE_PROD_CLIENT_ID"
            echo "AZURE_TENANT_ID=$AZURE_TENANT_ID"
          } >> "$GITHUB_ENV"

      # Persist the read-through cache (cargo-bench-history's --cache directory) across
      # runs so the bulk history is downloaded at most once instead of in full every
      # run. The key is unique per run (cache entries are immutable per key), and
      # restore-keys falls back to the most recent prior `bench-history-cache-` entry, so
      # each run restores the latest mirror, the analyze step tops it up with this run's
      # new objects, and this run saves a fresh entry on success. The path MUST match the
      # `--cache` directory the `gh-analyze-bench-history` recipe passes (relative to the
      # repo root). The cloud history is append-only (collect uses --skip-existing), so a
      # restored-but-slightly-stale mirror is always correct — a deliberate
      # --overwrite/prune bumps the cloud marker that wipes it on the next read.
      - name: Restore benchmark-history read-through cache
        uses: actions/cache@v4
        with:
          path: bench-history-cache
          key: bench-history-cache-${{ github.run_id }}
          restore-keys: |
            bench-history-cache-

      # Renders bench-history-report.md and bench-history-notable.txt. Findings never
      # fail the recipe (the tool always exits 0); the issue is advisory, not a gate.
      - name: Analyze benchmark history
        run: just gh-analyze-bench-history

      - name: Read notable flag
        id: notable
        shell: bash
        run: echo "value=$(cat bench-history-notable.txt)" >> "$GITHUB_OUTPUT"

      # JasonEtco/create-an-issue derives the issue title/labels from the file's YAML
      # front matter; the report the tool renders has none, so prepend a fixed header.
      # The fixed title is also the dedup key that turns findings into one rolling issue.
      # A lifecycle footer is appended so a reader understands the issue is refreshed
      # only on runs that still have findings, is never auto-closed, and that an
      # accepted regression must be blessed (not merely closed) — see the File step.
      - name: Compose regression issue
        if: steps.notable.outputs.value == 'true'
        shell: bash
        run: |
          # The lifecycle note printed below is literal Markdown: its backticks delimit inline
          # code spans, not shell command substitutions, and the single quotes keep them literal.
          # shellcheck disable=SC2016
          {
            printf -- '---\ntitle: Benchmark regressions detected\nlabels: bench-history, regression\n---\n\n'
            cat bench-history-report.md
            printf -- '\n\n---\n\n**Issue lifecycle:** This issue is maintained automatically by the `bench-history` workflow. Its body is refreshed on every push to `main` whose analysis still reports findings, so it always reflects the **latest run that had findings** — a run that finds nothing leaves it untouched rather than closing it. This issue is **not** closed automatically, and closing it by hand does **not** accept the regression: unless the change is blessed, the next analysis that still finds it just files a fresh issue. To accept an intentional change, bless the affected benchmarks at the commit named above, e.g. `cargo bench-history bless <benchmark-id-prefix> --context <commit>` (or `cargo bench-history bless --all --context <commit>` to accept every benchmark at that commit), then close the issue.\n'
          } > bench-history-issue.md

      # One rolling issue, updated rather than duplicated each run (the fixed title is
      # the dedup key), so a regression that persists does not spam new issues. Opened
      # only when findings exist; runs with none touch nothing.
      - name: File rolling regression issue
        if: steps.notable.outputs.value == 'true'
        uses: JasonEtco/create-an-issue@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          filename: bench-history-issue.md
          update_existing: true
          search_existing: open

  alert:
    # Open a deduplicated issue whenever collection or analysis fails, so a broken
    # run is noticed instead of silently rotting. Same main-only gate as the others.
    needs: [collect, analyze]
    if: failure() && github.repository == 'folo-rs/folo' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Open or update failure issue
        uses: JasonEtco/create-an-issue@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          filename: .github/bench-history-failure-issue.md
          update_existing: true
          search_existing: open

  resolve:
    # Mirror of `alert`: when collection AND analysis are green again, auto-close the
    # rolling failure issue (if one is open) so a fixed run does not leave a stale
    # alert rotting open. Gated on both needs' results being 'success' (explicit rather
    # than the implicit success() function, so a future unrelated job cannot affect this
    # decision); if either failed, alert (failure()) handles it and this is skipped. Same
    # main-only gate as the others. A no-op on runs when no failure issue is open.
    needs: [collect, analyze]
    if: >-
      needs.collect.result == 'success'
      && needs.analyze.result == 'success'
      && github.repository == 'folo-rs/folo'
      && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Least privilege: this job only talks to the issues API (no checkout, no contents).
    permissions:
      issues: write

    steps:
      # The alert job files exactly one rolling issue carrying $FAILURE_ISSUE_TITLE and the
      # ci-failure label; find any still-open instance and close it with an audit trail
      # linking the green run. Uses the preinstalled gh CLI (GH_REPO lets it run without a
      # checkout). Listing by `--label ci-failure` already excludes the advisory regression
      # issue (label `regression`, closed by hand); the exact-title jq match (the search the
      # alert path dedups on is substring/word-based) is a further guard. `--limit` defeats
      # the 30-result default so a backlog of historical duplicates would all be closed.
      - name: Close failure issue if open
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          set -euo pipefail
          numbers=$(gh issue list \
            --state open \
            --label ci-failure \
            --limit 100 \
            --json number,title \
            | jq -r --arg title "$FAILURE_ISSUE_TITLE" '.[] | select(.title == $title) | .number')
          if [ -z "$numbers" ]; then
            echo "No open failure issue to close."
            exit 0
          fi
          for n in $numbers; do
            echo "Closing #$n"
            gh issue close "$n" \
              --reason completed \
              --comment "✅ The bench-history workflow is green again — auto-closing this alert. Successful run: $RUN_URL"
          done
