name: Benchmark history

# Per-commit collection of the workspace's benchmark results into the long-lived Azure
# history store (account folohistory, baked into .cargo/bench_history.toml; see also
# infra/azure-bench-history-prod/). Each push to `main` benchmarks the whole workspace
# EXCEPT the slow, special-purpose `benchmarks` package, on every supported OS/architecture,
# and appends the results keyed by the pushed commit. Over time this builds the performance
# history that `cargo-bench-history analyze` reads to spot regressions.
#
# Runs per-push rather than on a nightly schedule: a nightly run re-benchmarks an unchanged
# tip for no gain and misses intermediate same-day commits, whereas per-push collects one
# data point per commit. The trade-off is more runner time on busy days.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Group by the commit SHA, not the ref. Distinct commits must collect in parallel — each is
# its own history data point, and cancelling one to favour a newer commit would drop that
# commit's measurements, defeating the per-commit goal (so the usual ref-keyed
# cancel-in-progress from validation.yml would be wrong here). cancel-in-progress therefore
# only dedups a redundant re-trigger of the SAME commit (a re-run, or a workflow_dispatch on
# an already-pushed commit), which `--skip-existing` would make a no-op append anyway.
concurrency:
  group: ${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: true

# Title of the rolling failure-alert issue, defined once and shared by the two jobs that
# reference it: the `alert` job files it under this exact title (via the shared
# gh-file-rolling-issue recipe), and the `resolve` job matches on it to close that issue.
# The rolling-issue filing dedups solely by exact title, so this string is the alert's
# identity; a single definition keeps the open and close paths from drifting apart.
env:
  FAILURE_ISSUE_TITLE: Benchmark-history workflow failed

jobs:
  collect:
    # Skip everywhere the OIDC sign-in cannot work: forks (only this repository's
    # identity can federate into Azure) and any ref other than main (the federated
    # credential is scoped to refs/heads/main, so a workflow_dispatch from a feature
    # branch would mint a non-matching subject and fail at azure/login). Gating here
    # makes such manual runs skip cleanly instead of failing red.
    if: github.repository == 'folo-rs/folo' && github.ref == 'refs/heads/main'

    strategy:
      # One platform's benchmarks failing must not abandon the others' history for this
      # commit; each platform stores into its own partition independently.
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, windows-latest, ubuntu-24.04-arm, windows-11-arm]

    runs-on: ${{ matrix.platform }}
    # Generous ceiling: the suite already takes a while and grows as benchmarks are
    # added; the matrix runs in parallel, so a high cap only bounds a genuinely stuck
    # run rather than the expected duration.
    timeout-minutes: 360

    # `id-token: write` lets cargo-bench-history mint short-lived GitHub OIDC tokens
    # (each a signed JWT proving "this run is repo folo-rs/folo on ref refs/heads/main").
    # The tool exchanges them directly with Entra, which matches each against the
    # dedicated prod managed identity's `main`-branch federated credential (created by
    # infra/azure-bench-history-prod/) and issues an access token — so CI authenticates
    # with no stored secret. Minting on demand (rather than once up front via
    # `azure/login`) is what keeps a multi-hour run authenticated past the ~1h
    # access-token lifetime. `contents: read` is the minimum the checkout needs.
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-environment

      # cargo-bench-history self-federates with GitHub OIDC: given the managed identity's
      # client id and tenant — plus the ACTIONS_ID_TOKEN_* values GitHub injects because
      # of id-token: write — it mints a fresh OIDC assertion each time Entra needs a new
      # access token, so a long run never re-submits an expired assertion. Export those
      # two identifiers from constants.env under the standard names the tool reads
      # (AZURE_PROD_CLIENT_ID is the prod identity's client id). The data store account
      # name is NOT needed here: it is baked into the committed .cargo/bench_history.toml.
      - name: Configure Azure federation identity from constants.env
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true

          # constants.env is a KEY=value file (with # comment lines). Read the two
          # identifiers the tool federates with and re-export them under the standard
          # AZURE_* names GitHub-injected steps and the tool read.
          $values = @{}
          foreach ($line in Get-Content constants.env) {
            if ($line -match '^\s*([^#=]+)=(.*)$') {
              $values[$Matches[1].Trim()] = $Matches[2].Trim()
            }
          }

          # Fail fast if either identifier is missing or empty: an empty
          # AZURE_CLIENT_ID / AZURE_TENANT_ID would otherwise silently break the tool's
          # OIDC federation far later with an opaque error, whereas the previous bash
          # step's `set -u` errored here.
          function Get-RequiredConstant($name) {
            $value = $values[$name]
            if ([string]::IsNullOrWhiteSpace($value)) {
              throw "constants.env is missing a non-empty '$name' (required for Azure federation)."
            }
            return $value
          }
          @(
            "AZURE_CLIENT_ID=$(Get-RequiredConstant 'AZURE_PROD_CLIENT_ID')"
            "AZURE_TENANT_ID=$(Get-RequiredConstant 'AZURE_TENANT_ID')"
          ) | Add-Content -Path $env:GITHUB_ENV -Encoding utf8

      # The deterministic engines (Callgrind, allocation/time counters) are
      # hardware-independent; the wall-clock engines are pinned to the fixed `github` machine
      # key (see the gh-collect-bench-history recipe) so a heterogeneous runner pool does not
      # fork the series.
      - name: Collect benchmark history
        run: just gh-collect-bench-history

  analyze:
    # Survey the freshly-updated history for regressions and post a rolling issue when
    # any finding survives. Runs after every platform finishes (even partially:
    # fail-fast is off) so this commit's analysis reflects whatever did land, and only on
    # main (where OIDC sign-in works), matching collect's gate.
    needs: collect
    if: always() && github.repository == 'folo-rs/folo' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # Analysis loads the whole store and reduces it; far faster than benchmarking, but the cap
    # must still clear a cold-cache setup-environment (up to ~90 min) on top of the analysis.
    timeout-minutes: 150

    # id-token to self-federate with Entra (reads the history; see collect's note),
    # contents for checkout, issues to file the rolling regression issue.
    permissions:
      id-token: write
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        # Full history: analyze walks first-parent commits to map stored runs to
        # committer timestamps; a shallow clone would hide most commits and skew it.
        with:
          fetch-depth: 0

      - name: Setup environment
        uses: ./.github/actions/setup-environment

      # Same self-federation as collect: export the prod identity's client id and tenant
      # under the standard names cargo-bench-history reads, then let the tool mint OIDC
      # assertions on demand (no azure/login). The account name is baked into config.
      - name: Configure Azure federation identity from constants.env
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true

          # constants.env is a KEY=value file (with # comment lines). Read the two
          # identifiers the tool federates with and re-export them under the standard
          # AZURE_* names the tool reads.
          $values = @{}
          foreach ($line in Get-Content constants.env) {
            if ($line -match '^\s*([^#=]+)=(.*)$') {
              $values[$Matches[1].Trim()] = $Matches[2].Trim()
            }
          }

          # Fail fast if either identifier is missing or empty: an empty
          # AZURE_CLIENT_ID / AZURE_TENANT_ID would otherwise silently break the tool's
          # OIDC federation far later with an opaque error, whereas the previous bash
          # step's `set -u` errored here.
          function Get-RequiredConstant($name) {
            $value = $values[$name]
            if ([string]::IsNullOrWhiteSpace($value)) {
              throw "constants.env is missing a non-empty '$name' (required for Azure federation)."
            }
            return $value
          }
          @(
            "AZURE_CLIENT_ID=$(Get-RequiredConstant 'AZURE_PROD_CLIENT_ID')"
            "AZURE_TENANT_ID=$(Get-RequiredConstant 'AZURE_TENANT_ID')"
          ) | Add-Content -Path $env:GITHUB_ENV -Encoding utf8

      # All bench-history scratch — the read-through cache and every rendered report/summary/
      # notable/issue-body file — lives under the runner temp directory, OUTSIDE the repo
      # checkout. Keeping it out of the working tree is what stops `analyze`'s own
      # `git status --porcelain` dirty-check from seeing these files (the cache is even restored
      # BELOW, before analyze runs) and wrongly annotating the analyzed tip
      # `+ uncommitted changes` on an otherwise-clean `main`. This step is the single source of
      # truth for that location; every step below derives its paths from `dir`. The individual
      # filenames (cache/, report.md, report.json, summary.md, notable.txt) are the contract the
      # `gh-analyze-bench-history` recipe writes; issue-body.md is composed here.
      - name: Resolve scratch directory
        id: scratch
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $dir = Join-Path $env:RUNNER_TEMP 'bench-history'
          New-Item -ItemType Directory -Path $dir -Force | Out-Null
          "dir=$dir" | Add-Content -Path $env:GITHUB_OUTPUT -Encoding utf8

      # Persist the read-through cache (cargo-bench-history's --cache directory) across
      # runs so the bulk history is downloaded at most once instead of in full every
      # run. The key is unique per run (cache entries are immutable per key), and
      # restore-keys falls back to the most recent prior `bench-history-cache-` entry, so
      # each run restores the latest mirror, the analyze step tops it up with this run's
      # new objects, and this run saves a fresh entry on success. The path MUST match the
      # `--cache` directory the `gh-analyze-bench-history` recipe passes (`<scratch>/cache`).
      # The cloud history is append-only (collect uses --skip-existing), so a
      # restored-but-slightly-stale mirror is always correct — a deliberate
      # --overwrite/prune bumps the cloud marker that wipes it on the next read.
      - name: Restore benchmark-history read-through cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.scratch.outputs.dir }}/cache
          key: bench-history-cache-${{ github.run_id }}
          restore-keys: |
            bench-history-cache-

      # Renders report.md (full Markdown), report.json (full JSON), summary.md (the condensed
      # top-findings Markdown) and notable.txt into the scratch directory. Findings never fail
      # the recipe (the tool always exits 0); the issue is advisory, not a gate.
      - name: Analyze benchmark history
        shell: pwsh
        env:
          SCRATCH_DIR: ${{ steps.scratch.outputs.dir }}
        run: just gh-analyze-bench-history "$env:SCRATCH_DIR"

      - name: Read notable flag
        id: notable
        shell: pwsh
        env:
          SCRATCH_DIR: ${{ steps.scratch.outputs.dir }}
        run: |
          $ErrorActionPreference = 'Stop'
          $value = (Get-Content (Join-Path $env:SCRATCH_DIR 'notable.txt') -Raw).Trim()
          "value=$value" | Add-Content -Path $env:GITHUB_OUTPUT -Encoding utf8

      # Attach the full Markdown and JSON reports to the run as a single artifact, so the
      # rolling issue can carry only the condensed summary (staying under GitHub's
      # 65,536-character issue-body limit) while a reader can still download the complete
      # reports. upload-artifact@v4 always produces a zip, so both files share one
      # artifact and one download URL; that URL stays valid while the run and artifact
      # exist. Uploaded only when notable, matching the rolling issue.
      - name: Upload full benchmark reports
        id: full_reports
        if: steps.notable.outputs.value == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: bench-history-full-report
          path: |
            ${{ steps.scratch.outputs.dir }}/report.md
            ${{ steps.scratch.outputs.dir }}/report.json
          if-no-files-found: error

      # The File step passes the title and labels to the gh-file-rolling-issue recipe as `gh`
      # flags, so this body needs NO YAML front matter — it is the pure issue body. That fixed
      # title is the dedup key that turns findings into one rolling issue.
      # The body carries the CONDENSED summary (not the full report) so it fits the issue
      # limit, followed by a link to the attached full reports and a footer with two parts:
      # a minimal "Issue lifecycle" summary (refreshed only on runs that still have findings,
      # never auto-closed) and a "What do I do?" section pointing at `examine` and the
      # bless-an-intentional-change vs. fix-a-defect decision — see the File step.
      - name: Compose regression issue
        if: steps.notable.outputs.value == 'true'
        shell: pwsh
        env:
          REPORT_ARTIFACT_URL: ${{ steps.full_reports.outputs.artifact-url }}
          SCRATCH_DIR: ${{ steps.scratch.outputs.dir }}
        run: |
          $ErrorActionPreference = 'Stop'

          $summary = (Get-Content (Join-Path $env:SCRATCH_DIR 'summary.md') -Raw).TrimEnd()
          $fullReport = "**Full report:** the complete Markdown and JSON reports are attached to this workflow run. [Download the full report bundle]($env:REPORT_ARTIFACT_URL)."
          # Literal Markdown: the backticks are inline code spans, kept verbatim by the
          # single-quoted here-string.
          $lifecycle = @'
          **Issue lifecycle**

          - Filed and refreshed automatically by the `bench-history` workflow; the body always reflects the latest `main` run that still had findings.
          - A run that finds nothing leaves it untouched; the issue is **never** closed automatically.
          - Closing it by hand does **not** accept the regression. A closed issue is never reopened; instead, the next run that still finds the regression files a new one.

          **What do I do?**

          First, see exactly how the series moved over time. Copy the benchmark id and metric from the finding above and run:

          `cargo bench-history examine --benchmark <id> --metric <name>`

          Then decide what the change is:

          - **An intentional tradeoff**: accept it by blessing the affected benchmarks at the named commit, e.g. `cargo bench-history bless <benchmark-id-prefix> --context <commit>` (or `cargo bench-history bless --all --context <commit>` to accept every benchmark at that commit), then close the issue.
          - **A defect to fix**: fix it as usual. A fixed finding self-clears on its own several runs after the fix, even without a blessing. This is **not** immediate: clearing it needs statistical evidence from multiple post-fix runs.
          '@

          # The title and labels are NOT front matter here — the File step passes them to the
          # gh-file-rolling-issue recipe as `gh` flags — so this file is the pure issue body.
          $parts = @(
            $summary
            ''
            '---'
            ''
            $fullReport
            ''
            '---'
            ''
            $lifecycle
          )
          Set-Content -Path (Join-Path $env:SCRATCH_DIR 'issue-body.md') -Value ($parts -join "`n") -Encoding utf8

      # One rolling issue, updated rather than duplicated each run (the fixed title is
      # the dedup key), so a regression that persists does not spam new issues. Opened
      # only when findings exist; runs with none touch nothing. Filed over `gh` via the
      # shared gh-file-rolling-issue recipe (the workflow's one issue-filing path) rather
      # than a template action, so the body file can live in the runner temp dir, outside
      # the repo checkout.
      - name: File rolling regression issue
        if: steps.notable.outputs.value == 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SCRATCH_DIR: ${{ steps.scratch.outputs.dir }}
        run: just gh-file-rolling-issue 'Benchmark regressions detected' 'bench-history,regression' (Join-Path $env:SCRATCH_DIR 'issue-body.md')

  alert:
    # Open a deduplicated issue whenever collection or analysis fails, so a broken
    # run is noticed instead of silently rotting. Same main-only gate as the others.
    needs: [collect, analyze]
    if: failure() && github.repository == 'folo-rs/folo' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Compose the failure-alert body (interpolating the failed run's URL) into the runner temp
      # dir, then file it with the same Publish-RollingIssue seam the regression path uses — one
      # rolling issue keyed on $FAILURE_ISSUE_TITLE, updated rather than duplicated on each failing
      # run, and auto-closed by the `resolve` job once the workflow is green again. The ci-failure
      # label is what `resolve` narrows its close search to. The module is imported directly (not
      # via `just`) because this lightweight notifier deliberately skips the build-environment
      # setup — same raw-`gh`-in-pwsh weight as the sibling `resolve` job; only checkout + the
      # preinstalled gh CLI are needed.
      - name: Open or update failure issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Import-Module ./scripts/bench-history/BenchHistoryIssue.psm1 -Force

          # Single-quoted here-string keeps the ``main`` inline-code backticks literal; only
          # $env:RUN_URL is interpolated, so build the body with an explicit format placeholder.
          $template = @'
          The **bench-history** workflow failed (collection or analysis). The
          benchmark history may be missing the pushed `main` commit until this is fixed.

          Failed run: {0}

          This issue is updated, not duplicated, on each failing run, and is closed
          automatically once the workflow runs green again.
          '@
          $body = $template -f $env:RUN_URL
          $bodyFile = Join-Path $env:RUNNER_TEMP 'bench-history-failure-issue.md'
          Set-Content -Path $bodyFile -Value $body -Encoding utf8

          $url = Publish-RollingIssue `
            -Title $env:FAILURE_ISSUE_TITLE `
            -Label 'bench-history,ci-failure' `
            -BodyFile $bodyFile `
            -Verbose
          Write-Host "Failure alert issue: $url"

  resolve:
    # Mirror of `alert`: when collection AND analysis are green again, auto-close the
    # rolling failure issue (if one is open) so a fixed run does not leave a stale
    # alert rotting open. Gated on both needs' results being 'success' (explicit rather
    # than the implicit success() function, so a future unrelated job cannot affect this
    # decision); if either failed, alert (failure()) handles it and this is skipped. Same
    # main-only gate as the others. A no-op on runs when no failure issue is open.
    needs: [collect, analyze]
    if: >-
      needs.collect.result == 'success'
      && needs.analyze.result == 'success'
      && github.repository == 'folo-rs/folo'
      && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Least privilege: this job only talks to the issues API (no checkout, no contents).
    permissions:
      issues: write

    steps:
      # The alert job files exactly one rolling issue carrying $FAILURE_ISSUE_TITLE and the
      # ci-failure label; find any still-open instance and close it with an audit trail
      # linking the green run. Uses the preinstalled gh CLI (GH_REPO lets it run without a
      # checkout). Listing by `--label ci-failure` already excludes the advisory regression
      # issue (label `regression`, closed by hand); the exact-title match mirrors the alert
      # path's own dedup key so the two stay in lockstep. `--limit` defeats the 30-result
      # default so a backlog of historical duplicates would all be closed.
      - name: Close failure issue if open
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true

          $issues = gh issue list --state open --label ci-failure --limit 100 --json number,title |
            ConvertFrom-Json
          $matching = @($issues | Where-Object { $_.title -eq $env:FAILURE_ISSUE_TITLE })
          if ($matching.Count -eq 0) {
            Write-Host 'No open failure issue to close.'
            exit 0
          }
          foreach ($issue in $matching) {
            Write-Host "Closing #$($issue.number)"
            gh issue close $issue.number --reason completed --comment "✅ The bench-history workflow is green again. Auto-closing this alert. Successful run: $env:RUN_URL"
          }
