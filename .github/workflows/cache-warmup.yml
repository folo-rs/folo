name: Cache warmup

# Keeps GitHub Actions caches warm to prevent expensive cold setups in validation
# workflows. GitHub evicts caches after 7 days of inactivity, so periodic access
# ensures the Rust compilation cache is always available for real CI runs.
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  warmup:
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, windows-latest, macos-latest, ubuntu-24.04-arm, windows-11-arm]

    runs-on: ${{ matrix.platform }}
    # This job's whole purpose is the cold-cache setup-environment, which can take up to
    # ~90 min; keep margin over that so a slightly-slower-than-usual warmup is not killed.
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup environment
        uses: ./.github/actions/setup-environment
